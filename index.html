<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mr Glass' Garden — Year 11 Biology</title>
<script src="config.js"></script>
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated;image-rendering:crisp-edges;}
/* ── FONT ── */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
body{
  background:#1a1408;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;min-height:100vh;padding:16px 0;
  font-family:'Press Start 2P',monospace;
}

/* ── GAME WRAPPER ── */
#gw{position:relative;width:680px;}
#gc{display:block;width:680px;height:440px;border:3px solid #8b6010;}
#mm{position:absolute;top:8px;right:8px;border:2px solid #5a4010;background:rgba(10,8,4,0.9);}
#sb{
  position:absolute;top:8px;left:8px;
  background:rgba(10,8,4,0.88);border:1px solid #7a5820;
  color:#f0d060;font-size:5px;padding:3px 7px;letter-spacing:1px;
}

/* ── HUD BAR ── */
#hud{
  background:#100c04;border:3px solid #8b6010;border-top:none;
  padding:5px 10px;display:flex;justify-content:space-between;align-items:center;
}
.hl{color:#f0d060;font-size:6px;letter-spacing:1px;}
.hr{color:#80c040;font-size:6px;}

/* ── INTERACTION HINT ── */
#ih{
  position:absolute;bottom:52px;left:50%;transform:translateX(-50%);
  background:rgba(10,8,4,0.97);border:2px solid #c8901c;
  color:#f0d060;font-size:6px;padding:6px 16px;
  pointer-events:none;white-space:nowrap;display:none;
  animation:pulse 1.2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{border-color:#c8901c;color:#f0d060;}50%{border-color:#f0d060;color:#fff8a0;}}

/* ── TOAST ── */
#toast{
  position:absolute;top:36px;left:50%;transform:translateX(-50%);
  background:rgba(10,8,4,0.97);border:2px solid #80c040;
  color:#80c040;font-size:5.5px;padding:5px 12px;
  display:none;white-space:nowrap;z-index:5;
}

/* ── DIALOG BOX ── */
#dlg{
  position:absolute;bottom:6px;left:6px;right:6px;
  background:rgba(8,6,3,0.97);border:2px solid #c8901c;
  padding:8px 12px;display:none;min-height:48px;z-index:4;
}
#dlgname{color:#f0d060;font-size:5.5px;margin-bottom:5px;}
#dlgtxt{color:#c8a870;font-size:5px;line-height:2;}
#dlgcont{color:#7a5828;font-size:4.5px;margin-top:4px;}

/* ── NAME ENTRY SCREEN ── */
#ns{
  position:absolute;inset:0;
  background:rgba(6,4,2,0.98);z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
#nstitle{color:#f0d060;font-size:9px;margin-bottom:6px;text-align:center;line-height:1.6;}
#nssub{color:#7a5828;font-size:5.5px;margin-bottom:14px;text-align:center;}
.nfield{
  background:#100c04;border:2px solid #5a4010;color:#f0d060;
  font-family:inherit;font-size:7px;padding:8px 12px;
  width:240px;outline:none;text-align:center;
}
.nfield:focus{border-color:#c8901c;}
.nbtn{
  background:#201404;border:2px solid #c8901c;color:#f0d060;
  font-family:inherit;font-size:6px;padding:8px 20px;cursor:pointer;width:240px;
}
.nbtn:hover{background:#341a06;}
#nhint{color:#5a4820;font-size:5px;min-height:14px;}

/* ── PARCHMENT MODAL ── */
#mo{
  display:none;position:absolute;inset:0;
  background:rgba(4,3,1,0.88);z-index:10;
  align-items:center;justify-content:center;
}
#mo.open{display:flex;}
#mb{
  /* Warm parchment style — cream background, brown wood border */
  background:#f5e8c8;
  border:4px solid #7a4c10;
  outline:2px solid #c8901c;
  width:93%;max-width:610px;max-height:92%;
  display:flex;flex-direction:column;
  box-shadow:0 4px 0 #5a3808, 4px 0 0 #5a3808, -4px 0 0 #5a3808, 0 -2px 0 #5a3808;
}
/* Modal header — dark wood */
#mh{
  background:#7a4c10;
  padding:10px 14px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:3px solid #5a3808;
}
#mt{color:#f0d060;font-size:7px;letter-spacing:1px;}
#mclose{
  background:#501008;border:2px solid #c03010;
  color:#f0d060;font-size:6px;padding:4px 8px;
  cursor:pointer;font-family:inherit;
}
#mclose:hover{background:#6a1810;}
/* Modal body — parchment */
#mbody{
  overflow-y:auto;padding:14px 16px;flex:1;
  background:#f5e8c8;
  color:#3a2004;
  scrollbar-width:thin;scrollbar-color:#7a4c10 #e8d8a8;
}
#mbody::-webkit-scrollbar{width:6px;}
#mbody::-webkit-scrollbar-track{background:#e8d8a8;}
#mbody::-webkit-scrollbar-thumb{background:#7a4c10;border-radius:2px;}

/* ── MODAL CONTENT STYLES ── */
.msect{margin-bottom:16px;}
.msectitle{
  color:#5a3000;font-size:6.5px;margin-bottom:8px;
  padding-bottom:4px;border-bottom:2px solid #c8901c;
  letter-spacing:1px;
}
.iqlabel{color:#7a4000;font-size:5.5px;margin:10px 0 4px;}

/* Dot point rows */
.dprow{
  display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;
  cursor:pointer;padding:5px;
  border:1px solid #e0c890;
  background:#fdf5dc;
  transition:all 0.1s;
}
.dprow:hover{border-color:#c8901c;background:#fff8e8;}
.dpbox{
  flex-shrink:0;width:14px;height:14px;border:2px solid;
  display:flex;align-items:center;justify-content:center;font-size:8px;
}
.dpbox.none{border-color:#c8a860;background:#f0e8d0;color:transparent;}
.dpbox.prog{border-color:#c8901c;background:#fff0c0;color:#c8901c;}
.dpbox.conf{border-color:#40a020;background:#d8f0c8;color:#40a020;}
.dptext{color:#3a2004;font-size:5px;line-height:1.9;}

/* Legend */
.legend{display:flex;gap:12px;margin-bottom:10px;}
.legitem{display:flex;align-items:center;gap:4px;color:#7a4820;font-size:5px;}
.legbox{width:10px;height:10px;border:2px solid;}
.legbox.none{border-color:#c8a860;background:#f0e8d0;}
.legbox.prog{border-color:#c8901c;background:#fff0c0;}
.legbox.conf{border-color:#40a020;background:#d8f0c8;}

/* Stats row */
.stats{display:flex;gap:8px;margin-bottom:10px;}
.statbox{
  flex:1;background:#fdf0d0;border:2px solid #c8a860;
  padding:6px 8px;
}
.statlabel{color:#7a5820;font-size:4.5px;margin-bottom:3px;}
.statval{font-size:9px;}
.statval.g{color:#40a020;}
.statval.o{color:#c8901c;}
.statval.d{color:#c8a860;}

/* Progress bar */
.pbar{height:10px;background:#2a1c04;border:2px solid #c8a860;margin:4px 0 10px;overflow:hidden;border-radius:2px;}
.pbfill{height:100%;background:#80c040;transition:width 0.6s ease;}
/* Progress bar gradient is set inline based on value */
.mbicon{width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:6px;image-rendering:pixelated;}

/* Quiz rows */
.qrow{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 8px;border:1px solid #e0c890;background:#fdf5dc;
  margin-bottom:3px;cursor:pointer;transition:all 0.1s;
}
.qrow:hover{border-color:#c8901c;background:#fff8e8;}
.qlabel{color:#3a2004;font-size:5px;}
.qcheck{
  width:14px;height:14px;border:2px solid #c8a860;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#40a020;
}
.qcheck.done{background:#d8f0c8;border-color:#40a020;}

/* Assessment beds */
.bedbox{border:2px solid #c8a860;padding:10px;margin-bottom:10px;background:#fdf0d0;}
.bedtitle{color:#5a3000;font-size:6.5px;margin-bottom:4px;}
.bedsub{color:#7a5820;font-size:5px;margin-bottom:8px;}
.bedbtn{
  background:#d8f0c8;border:2px solid #40a020;color:#305010;
  font-size:5.5px;padding:5px 10px;cursor:pointer;font-family:inherit;
}
.bedbtn:hover{background:#c8e8b8;}
.bedbtn.done{background:#f0fce8;color:#80b060;border-color:#80b060;cursor:default;}

/* Practical rows */
.practrow{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 8px;border:1px solid #e0c890;background:#fdf5dc;
  margin-bottom:3px;cursor:pointer;
}
.practrow:hover{border-color:#4898d0;background:#eef8ff;}

/* Mail messages */
.mailmsg{background:#eef4ff;border:2px solid #8898c0;padding:8px 10px;margin-bottom:8px;}
.mailfrom{color:#506090;font-size:5px;margin-bottom:2px;}
.mailsubj{color:#304080;font-size:5.5px;margin-bottom:4px;}
.mailbody{color:#505878;font-size:5px;line-height:1.8;}
.mailnew{border-color:#6878c8;}

/* Note / hint text */
.mnote{color:#7a5820;font-size:5px;margin:6px 0 10px;}

/* Save status */
.saveline{color:#c8a860;font-size:4.5px;text-align:right;margin-top:6px;}
.saveline.ok{color:#70a040;}

/* Section group heading */
.grouphead{color:#80c040;font-size:6.5px;margin-bottom:6px;letter-spacing:1px;}
</style>
</head>
<body>
<div id="gw">
  <canvas id="gc" width="680" height="440"></canvas>
  <canvas id="mm" width="80" height="80"></canvas>
  <div id="sb"></div>
  <div id="hud">
    <div class="hl" id="hudtitle"></div>
    <div class="hr" id="hr">WASD · E=INTERACT · SPACE=NEXT</div>
  </div>
  <span id="ih"></span>
  <div id="toast"></div>
  <div id="dlg">
    <div id="dlgname"></div>
    <div id="dlgtxt"></div>
    <div id="dlgcont">[SPACE] to continue</div>
  </div>

  <!-- Name entry (first visit) -->
  <div id="ns">
    <div id="nstitle"></div>
    <div id="nssub"></div>
    <input class="nfield" id="ninput" type="text" placeholder="Enter your first name" maxlength="20" autocomplete="off">
    <button class="nbtn" id="nsubmit">ENTER THE GARDEN</button>
    <div id="nhint">Your progress is saved on this device only</div>
  </div>

  <!-- Main modal -->
  <div id="mo">
    <div id="mb">
      <div id="mh">
        <span id="mt"></span>
        <button id="mclose">&#10005; CLOSE</button>
      </div>
      <div id="mbody"></div>
    </div>
  </div>
</div>

const SYLLABUS = CONFIG_SYLLABUS;
const QZ       = CONFIG_QUIZZES;
const PR       = CONFIG_PRACTICALS;

// ── LOCAL STORAGE ─────────────────────────────────────────────────────
const LS_KEY = 'mrglassgarden_v2';

function defaultState() {
  const dp={};
  Object.keys(SYLLABUS).forEach(m=>{
    SYLLABUS[m].iq.forEach((q,qi)=>{
      q.points.forEach((_,pi)=>{ dp[m+'_'+qi+'_'+pi]='none'; });
    });
  });
  const qz={};
  Object.keys(QZ).forEach(m=>{ QZ[m].forEach((_,i)=>{ qz[m+'_'+i]=false; }); });
  const pr={};
  PR.forEach((_,i)=>{ pr['p'+i]=false; });
  const at={};
  CONFIG_ASSESSMENTS.forEach(a=>{ at[a.key]=false; });
  return {
    name:'', dp, qz, pr, at,
    mail: CONFIG_MAIL.map(m=>Object.assign({},m)),
    mailRead:[], stepCount:0, achievements:[],
  };
}

let ST = defaultState();
let saveTimer=null, lastSaved=null;

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return false;
    const s = JSON.parse(raw);
    if(s.name) ST.name=s.name;
    if(s.dp)   Object.assign(ST.dp,s.dp);
    if(s.qz)   Object.assign(ST.qz,s.qz);
    if(s.pr)   Object.assign(ST.pr,s.pr);
    if(s.at)   Object.assign(ST.at,s.at);
    if(s.mailRead)    ST.mailRead=s.mailRead;
    if(s.stepCount)   ST.stepCount=s.stepCount;
    if(s.achievements) ST.achievements=s.achievements;
    ST.mail = CONFIG_MAIL.map(m=>Object.assign({},m));
    return !!s.name;
  } catch(e) { return false; }
}

function saveState() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      name:ST.name, dp:ST.dp, qz:ST.qz, pr:ST.pr, at:ST.at,
      mailRead:ST.mailRead, stepCount:ST.stepCount, achievements:ST.achievements,
    }));
    lastSaved = Date.now();
  } catch(e) { console.warn('Save failed:',e); }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 1500);
}

// ── ACHIEVEMENTS ──────────────────────────────────────────────────────
function checkAchievements() {
  CONFIG_ACHIEVEMENTS.forEach(a=>{
    if(!ST.achievements.includes(a.key) && a.check(ST)) {
      ST.achievements.push(a.key);
      showToast(a.toast);
      scheduleSave();
    }
  });
}

var TM_TS=16, TM_ST=17;
function dt(col,row,dx,dy,dw,dh) {
  if(!tmImg.complete||tmImg.naturalWidth===0) return;
  X.drawImage(tmImg, col*TM_ST, row*TM_ST, TM_TS, TM_TS, dx, dy, dw||TM_TS, dh||TM_TS);
}
function dtc(col,row,dx,dy,dw,dh,ctx) {
  // Draw to a specific context (for offscreen canvases)
  var c=ctx||X;
  if(!tmImg.complete||tmImg.naturalWidth===0) return;
  c.drawImage(tmImg, col*TM_ST, row*TM_ST, TM_TS, TM_TS, dx, dy, dw||TM_TS, dh||TM_TS);
}

// Hero sprite (LPC format: 4 directions x 3 frames)
function drawHeroSprite(dir, frame, dx, dy, scale, flip) {
  if(!heroImg.complete||heroImg.naturalWidth===0) return;
  const sw=16*scale, sh=16*scale;
  if(flip){ X.save();X.scale(-1,1);X.drawImage(heroImg,frame*16,dir*16,16,16,-(dx+sw),dy,sw,sh);X.restore(); }
  else X.drawImage(heroImg,frame*16,dir*16,16,16,dx,dy,sw,sh);
}

// ── WORLD TILE MAP ────────────────────────────────────────────────────
// 0=grass  1=path_vert  2=path_horiz  3=stone  4=dirt  5=water  6=cobble
// Build the tile map
const TM = [];
function buildTileMap() {
  // Fill with grass
  for(let r=0;r<ROWS;r++) {
    TM.push([]);
    for(let c=0;c<COLS;c++) TM[r].push(0);
  }
  // Vertical path (cols 13-15, full height)
  for(let r=0;r<ROWS;r++) {
    TM[r][13]=1; TM[r][14]=1; TM[r][15]=1;
  }
  // Horizontal path (rows 23-25, full width)
  for(let c=0;c<COLS;c++) {
    TM[23][c]=2; TM[24][c]=2; TM[25][c]=2;
  }
  // Pond (water) top-right area
  for(let r=1;r<6;r++) for(let c=28;c<35;c++) TM[r][c]=5;
  // Stone cobble patches near cave
  for(let r=27;r<32;r++) for(let c=30;c<38;c++) TM[r][c]=3;
  // Dirt garden area
  for(let r=14;r<23;r++) for(let c=1;c<10;c++) TM[r][c]=4;
}
buildTileMap();

  {x:WW-T, y:0, w:T, h:WH},
  {x:0, y:WH-T, w:WW, h:T},
];

function isBlocked(nx, ny) {
  const pw=12, ph=14; // player collision box (slightly smaller than tile)
  for(const b of COLLISION_BOXES) {
    if(nx+pw > b.x && nx < b.x+b.w && ny+ph > b.y && ny < b.y+b.h) return true;
  }
  return false;
}

// ── INTERACTABLE OBJECTS ──────────────────────────────────────────────
const OBJS=[
  {id:'house',   label:'FARMHOUSE (Syllabus)',          cx:7,  cy:5,  r:5.5},
  {id:'tree',    label:'STUDY TREE (Quizzes)',           cx:29, cy:3,  r:4.5},

  {id:'cave',    label:'CAVE (Extension)',               cx:34, cy:30, r:4.5},
];
function nearObj() {
  const px=pl.x/T+.5, py=pl.y/T+.5;
  for(const o of OBJS) if(Math.hypot(px-o.cx,py-o.cy)<o.r) return o;

}

// ── PLAYER ────────────────────────────────────────────────────────────
const pl={
  x:14*T, y:20*T,
  dir:2,       // 0=N 1=W 2=S 3=E
  moving:false,
  walkF:0,
  stepCount:0,
};

function drawPlayer() {
  const {sx,sy}=sw(pl.x,pl.y);
  const bob=(pl.moving&&Math.floor(fc/6)%2===0)?-1:0;
  const SC=2, SH=16*SC, SW=16*SC;
  const dy=sy+bob;
  // Shadow
  X.fillStyle=P.sh;
  X.beginPath();X.ellipse(sx+SW/2,dy+SH,8,3,0,0,Math.PI*2);X.fill();
  // Sprite
  if(!heroImg.complete||heroImg.naturalWidth===0) {
    X.fillStyle=P.hw1;X.fillRect(sx+3,dy+2,SW-6,SH-2);
    return;
  }
  // LPC sprite: row=dir (0=up,1=left,2=down,3=right), col=frame
  const frame=pl.moving?(Math.floor(pl.walkF/5)%2===0?0:2):1;
  const lpcDir=[0,1,2,3][pl.dir];
  if(pl.dir===1) drawHeroSprite(1,frame,sx,dy,SC,false);
  else drawHeroSprite(lpcDir,frame,sx,dy,SC,false);
}

// ── MINIMAP ───────────────────────────────────────────────────────────
function drawMinimap() {
  const S=80, sc=S/WW;
  MX.fillStyle='#2a5008'; MX.fillRect(0,0,S,S);
  // Paths
  MX.fillStyle='#806030';
  MX.fillRect(13*T*sc,0,3*T*sc,S);
  MX.fillRect(0,23*T*sc,S,3*T*sc);
  // Pond
  MX.fillStyle='#2848c0';
  MX.fillRect(28*T*sc,T*sc,7*T*sc,5*T*sc);
  // Landmarks
  const lms=[
    {cx:7,cy:5,c:'#b06040'},   // house
    {cx:29,cy:3,c:'#286018'},  // tree
    {cx:5,cy:18,c:'#4a7020'},  // garden
    {cx:28,cy:19,c:'#506070'}, // well
    {cx:18,cy:28,c:'#c01010'}, // mailbox
    {cx:20,cy:14,c:'#c89000'}, // market
    {cx:34,cy:30,c:'#303048'}, // cave
  ];
  lms.forEach(l=>{

  });

  MX.strokeRect(cam.x*sc,cam.y*sc,VW*sc,VH*sc);

// ── CAMERA ────────────────────────────────────────────────────────────
function updateCam() {
  const tx=pl.x+T-VW/2, ty=pl.y+T-VH/2;
  cam.x+=(tx-cam.x)*.12;
  cam.y+=(ty-cam.y)*.12;
  cam.x=Math.max(0,Math.min(WW-VW,cam.x));
  cam.y=Math.max(0,Math.min(WH-VH,cam.y));
}

// World→screen coordinate transform
function sw(wx,wy){return{sx:Math.round(wx-cam.x),sy:Math.round(wy-cam.y)};}

// ── PLAYER UPDATE ─────────────────────────────────────────────────────
function updatePlayer() {
  if(modalOpen||dlgQueue.length){pl.moving=false;return;}
  const spd=2;
  let dx=0,dy=0;
  if(K['ArrowLeft'] ||K['a']||K['A']){dx=-spd;pl.dir=1;}
  if(K['ArrowRight']||K['d']||K['D']){dx= spd;pl.dir=3;}
  if(K['ArrowUp']   ||K['w']||K['W']){dy=-spd;pl.dir=0;}
  if(K['ArrowDown'] ||K['s']||K['S']){dy= spd;pl.dir=2;}
  pl.moving=dx!==0||dy!==0;
  // Separate axis collision
  const nx=pl.x+dx, ny=pl.y+dy;
  if(dx && !isBlocked(nx,pl.y)) pl.x=nx;
  if(dy && !isBlocked(pl.x,ny)) pl.y=ny;
  if(pl.moving){pl.walkF=(pl.walkF+1)%12;ST.stepCount++;}
  checkAchievements();
}

// ── HINT UPDATE ───────────────────────────────────────────────────────
function updateHint() {
  const obj=nearObj();
  const ih=document.getElementById('ih');
  const hr=document.getElementById('hr');
  if(obj&&!modalOpen&&!dlgQueue.length){
    ih.style.display='block';
    ih.textContent='[E] '+obj.label;
    hr.textContent='[E] OPEN: '+obj.label;
  } else {
    ih.style.display='none';
    hr.textContent=dlgQueue.length?'[SPACE] Continue':'WASD · E=INTERACT';
  }
}

// ════════════════════════════════════════════════════════════════════════
//  WORLD DRAWING — Kenney-palette pixel art
// ════════════════════════════════════════════════════════════════════════

// ── GROUND TILES ──────────────────────────────────────────────────────
// ── TERRAIN TEXTURE BUILDER ──────────────────────────────────────────
// Called once after poImg loads. Paints grass and path to offscreen
// canvases. drawGround() then just blits them — zero tile borders.

function tileHash(col,row) {
  return ((col*2654435761)^(row*2246822519))>>>0;
}

function buildTerrainTextures() {
  if(!tmImg.complete||tmImg.naturalWidth===0) return;

  // ── GRASS TEXTURE ──────────────────────────────────────────────────
  // Tiny Town grass tiles (0,0)(1,0)(2,0) are seamless 16px tiles
  // Paint entire world canvas tiling these three variants
  // Use a hash to pick variant per tile — no visible seams

  GX.clearRect(0,0,WW,WH);

  for(var row=0;row<ROWS;row++) {
    for(var col=0;col<COLS;col++) {
      var tileType=TM[row]?TM[row][col]:0;
      if(tileType!==0) continue;
      var h=tileHash(col,row);
      // Three grass variants at tilemap (0,0),(1,0),(2,0)
      // Weight towards plain grass: 0=50%, 1=30%, 2=20%
      var variant = h%10 < 5 ? 0 : h%10 < 8 ? 1 : 2;
      GX.drawImage(tmImg, variant*TM_ST, 0, TM_TS, TM_TS, col*T, row*T, T, T);
    }
  }

  // ── DIRT/EARTH TEXTURE ─────────────────────────────────────────────
  // Dirt tiles rows 1-3 cols 0-2 — 9 variants, all seamless
  for(var row=0;row<ROWS;row++) {
    for(var col=0;col<COLS;col++) {
      var tileType=TM[row]?TM[row][col]:0;
      if(tileType!==4) continue;
      var h=tileHash(col,row);
      // Pick from 6 earth variants (rows 1-2, cols 0-2)
      var earthRow = h%3 < 2 ? 1 : 2;
      var earthCol = h%3;
      GX.drawImage(tmImg, earthCol*TM_ST, earthRow*TM_ST, TM_TS, TM_TS, col*T, row*T, T, T);
    }
  }

  // ── STONE TEXTURE (cave area) ──────────────────────────────────────
  // Use castle wall tiles (0,8)(1,8)(2,8)
  for(var row=0;row<ROWS;row++) {
    for(var col=0;col<COLS;col++) {
      var tileType=TM[row]?TM[row][col]:0;
      if(tileType!==3) continue;
      var h=tileHash(col,row);
      var stoneCol = h%3;
      GX.drawImage(tmImg, stoneCol*TM_ST, 8*TM_ST, TM_TS, TM_TS, col*T, row*T, T, T);
    }
  }

  grassReady=true;

  // ── PATH/COBBLE TEXTURE ────────────────────────────────────────────
  // Use earth tiles (rows 1-3) for paths — warm earthy cobble look
  // Draw at native 16px = T size, seamless tiling

  PX.clearRect(0,0,WW,WH);
  for(var row=0;row<ROWS;row++) {
    for(var col=0;col<COLS;col++) {
      var tileType=TM[row]?TM[row][col]:0;
      if(tileType!==1&&tileType!==2) continue;
      var h=tileHash(col,row);
      // Earth row 3 (cols 0-2) has subtle earth/grass mix — good for worn paths
      var pathCol = h%3;
      PX.drawImage(tmImg, pathCol*TM_ST, 3*TM_ST, TM_TS, TM_TS, col*T, row*T, T, T);
    }
  }
  pathReady=true;
}

function drawGround() {
  var camX = Math.round(cam.x);
  var camY = Math.round(cam.y);

  if(grassReady) {
    // Blit the pre-rendered grass canvas with camera offset
    X.drawImage(grassCanvas, camX, camY, VW, VH, 0, 0, VW, VH);
  } else {
    // Fallback: solid base green
    X.fillStyle = '#306000';
    X.fillRect(0,0,VW,VH);
  }

  // Water tiles — draw base colour (animated water drawn later)
  var c0=Math.max(0,Math.floor(cam.x/T));
  var c1=Math.min(COLS,Math.ceil((cam.x+VW)/T)+1);
  var r0=Math.max(0,Math.floor(cam.y/T));
  var r1=Math.min(ROWS,Math.ceil((cam.y+VH)/T)+1);
  for(var row=r0;row<r1;row++) {
    for(var col=c0;col<c1;col++) {
      if((TM[row]?TM[row][col]:0)===5) {
        var p=sw(col*T,row*T);
        X.fillStyle=P.wa1;X.fillRect(p.sx,p.sy,T,T);
      }
    }
  }
}

// ── DRAW PATHS ─────────────────────────────────────────────────────────
// Drawn as a separate pass after grass so paths sit on top cleanly.
function drawPaths() {
  if(!pathReady) return;
  var camX = Math.round(cam.x);
  var camY = Math.round(cam.y);
  X.drawImage(pathCanvas, camX, camY, VW, VH, 0, 0, VW, VH);
}

// ── POND — WATER, DEPTH, LILY PADS, REEDS, BOATS ──────────────────────
function drawWater() {
  var c0=Math.max(27,Math.floor(cam.x/T));
  var c1=Math.min(36,Math.ceil((cam.x+VW)/T)+1);
  var r0=Math.max(0,Math.floor(cam.y/T));
  var r1=Math.min(7,Math.ceil((cam.y+VH)/T)+1);
  var loaded=poImg.complete&&poImg.naturalWidth>0;

  for(var row=r0;row<r1;row++) {
    for(var col=c0;col<c1;col++) {
      var tileVal=TM[row]?TM[row][col]:0;
      var p=sw(col*T,row*T);
      var wsx=p.sx, wsy=p.sy;

      if(tileVal===5) {
        // Water base — deep blue
        X.fillStyle=P.wa1;X.fillRect(wsx,wsy,T,T);
        // Mid layer
        X.fillStyle=P.wa2;X.fillRect(wsx+1,wsy+1,T-2,T-2);
        // Shimmer/caustic pattern
        X.fillStyle=P.wa3;X.fillRect(wsx+2,wsy+2,T-4,T-4);
        // Animated ripple
        var rOff=Math.floor((fc*0.28+col*2.1+row*1.8))%T;
        X.fillStyle=P.wa4;
        X.fillRect(wsx+rOff,wsy+T/2-1,4,2);
        // Caustic shimmer — subtle bright flecks
        var cOff=(fc*0.15+col*3+row*5)%40;
        if(cOff < 3) {
          X.save();X.globalAlpha=0.25;
          X.fillStyle='#90d0ff';
          X.fillRect(wsx+(col*7)%T,wsy+(row*5)%T,2,1);
          X.restore();
        }
      } else if(tileVal===0) {
        // Grass adjacent to water — draw pond edge tile
        var adjWater=false;
        var dirs=[[0,1],[0,-1],[1,0],[-1,0]];
        for(var d=0;d<dirs.length;d++) {
          var nr=row+dirs[d][1], nc=col+dirs[d][0];
          if(TM[nr]&&TM[nr][nc]===5){adjWater=true;break;}
        }
        if(adjWater&&loaded) {
          X.drawImage(poImg,0,288,64,64,wsx,wsy,T,T);
        }
      }
    }
  }

  // ── DEPTH GRADIENT over water ────────────────────────────────────
  var pondPx = sw(28*T, T);
  X.save();
  var depthG = X.createRadialGradient(
    pondPx.sx+3*T, pondPx.sy+2*T, T*0.5,
    pondPx.sx+3*T, pondPx.sy+2*T, T*3.5
  );
  depthG.addColorStop(0, 'rgba(10,20,60,0.35)');
  depthG.addColorStop(1, 'rgba(10,20,60,0)');
  X.fillStyle=depthG;
  X.fillRect(pondPx.sx,pondPx.sy, 7*T,5*T);
  X.restore();

  // ── LILY PADS ────────────────────────────────────────────────────
  var lilyPositions=[
    [29,2,0],[31,3,1],[33,2,2],[30,4,3],[32,4,4]
  ];
  lilyPositions.forEach(function(lp) {
    var lc=lp[0],lr=lp[1],li=lp[2];
    var pp=sw(lc*T,lr*T);
    var lpx=pp.sx, lpy=pp.sy;
    if(lpx<-T||lpx>VW+T||lpy<-T||lpy>VH+T) return;
    // Gentle bob
    var bob=Math.sin(fc*0.02+li*1.3)*1.5;
    // Pad
    X.save();X.globalAlpha=0.9;
    X.fillStyle='#2a6810';
    X.beginPath();
    X.ellipse(lpx+T/2,lpy+T/2+bob,T*0.45,T*0.35,li*0.4,0,Math.PI*2);
    X.fill();
    // Lighter centre
    X.fillStyle='#3a8018';
    X.beginPath();
    X.ellipse(lpx+T/2,lpy+T/2+bob,T*0.28,T*0.22,li*0.4,0,Math.PI*2);
    X.fill();
    // V-notch
    X.strokeStyle='#1a5008';X.lineWidth=1;
    X.beginPath();
    X.moveTo(lpx+T/2,lpy+T/2+bob);
    X.lineTo(lpx+T/2,lpy+bob);
    X.stroke();
    // Flower on some pads
    if(li%2===0) {
      X.fillStyle='#f8e0a0';
      X.beginPath();
      X.arc(lpx+T/2,lpy+T/4+bob,3,0,Math.PI*2);
      X.fill();
      X.fillStyle='#f0c040';
      X.beginPath();
      X.arc(lpx+T/2,lpy+T/4+bob,1.5,0,Math.PI*2);
      X.fill();
    }
    X.restore();
  });

  // ── REEDS at water edge ───────────────────────────────────────────
  var reedPositions=[
    [28,3,0],[28,4,1],[34,2,2],[34,4,3],[30,1,4],[32,1,5]
  ];
  reedPositions.forEach(function(rp) {
    var rc=rp[0],rr=rp[1],ri=rp[2];
    var pp=sw(rc*T+ri%3*4,rr*T);
    var rpx=pp.sx, rpy=pp.sy;
    if(rpx<-T||rpx>VW+T||rpy<-T||rpy>VH+T) return;
    var sway=Math.sin(fc*0.025+ri*0.8)*2;
    // Stem
    X.save();
    X.strokeStyle='#4a7820';X.lineWidth=2;
    X.beginPath();
    X.moveTo(rpx+T/2,rpy+T);
    X.quadraticCurveTo(rpx+T/2+sway,rpy+T/2,rpx+T/2+sway*1.5,rpy);
    X.stroke();
    // Reed head
    X.fillStyle='#6a4010';
    X.fillRect(rpx+T/2+sway*1.5-2,rpy-6,4,8);
    X.fillStyle='#8a5818';
    X.fillRect(rpx+T/2+sway*1.5-1,rpy-7,2,9);
    X.restore();
  });

  drawBoats();
}

function drawBoats() {
  var loaded=poImg.complete&&poImg.naturalWidth>0;
  if(!loaded) return;
  var pb1=sw(28*T,5*T);
  X.drawImage(poImg,0,448,96,64,pb1.sx,pb1.sy,T*2,T);
  var pb2=sw(31*T,4*T);
  X.drawImage(poImg,96,448,96,64,pb2.sx,pb2.sy,T*2,T);
}


function drawFence() {
  X.fillStyle=P.wd2;
  const posts=[];
  // Top fence
  for(let c=0;c<COLS;c++) {
    const {sx,sy}=sw(c*T,0);
    X.fillStyle=P.wd3;X.fillRect(sx,sy,T,4);
    X.fillStyle=P.wd4;X.fillRect(sx,sy,T,2);
    if(c%4===0) {posts.push([sx,sy]);}
  }
  // Bottom fence
  for(let c=0;c<COLS;c++) {
    const {sx,sy}=sw(c*T,(ROWS-1)*T+T-4);
    X.fillStyle=P.wd3;X.fillRect(sx,sy,T,4);
    X.fillStyle=P.wd4;X.fillRect(sx,sy,T,2);
  }
  // Left fence
  for(let r=0;r<ROWS;r++) {
    const {sx,sy}=sw(0,r*T);
    X.fillStyle=P.wd3;X.fillRect(sx,sy,4,T);
    X.fillStyle=P.wd4;X.fillRect(sx,sy,2,T);
  }
  // Right fence
  for(let r=0;r<ROWS;r++) {
    const {sx,sy}=sw((COLS-1)*T+T-4,r*T);
    X.fillStyle=P.wd3;X.fillRect(sx,sy,4,T);
    X.fillStyle=P.wd4;X.fillRect(sx,sy,2,T);
  }
  // Post caps
  posts.forEach(function(post){
    var fsx=post[0],fsy=post[1];
    X.fillStyle=P.wd1;X.fillRect(fsx,fsy,5,T/2);
    X.fillStyle=P.wd2;X.fillRect(fsx+1,fsy,3,T/2);
  });
}

// ── FARMHOUSE (Kenney orange-roof style) ──────────────────────────────
// Position: x=2*T, y=T  —  footprint: 11 wide x 8 tall tiles
function drawFarmhouse() {
  var ox=2*T, oy=T;
  var p=sw(ox,oy);
  var bsx=p.sx, bsy=p.sy;
  var fw=11, fh=8;

  if(!tmImg.complete||tmImg.naturalWidth===0) {
    X.fillStyle=P.hw1;X.fillRect(bsx,bsy,fw*T,fh*T);
    return;
  }

  // ── MODULE PROGRESS for window glow ──────────────────────────────
  // Count confident dot points per module
  var modProgress = {};
  ['m1','m2','m3','m4'].forEach(function(m) {
    var total=0, conf=0;
    Object.keys(ST.dp).forEach(function(k){
      if(k.indexOf(m+'_')===0) {
        total++;
        if(ST.dp[k]==='conf') conf++;
      }
    });
    modProgress[m] = total>0 ? conf/total : 0;
  });

  // ── ROOF ──────────────────────────────────────────────────────────
  var roofRows=3;
  for(var tr=0;tr<roofRows;tr++) {
    for(var tc=0;tc<fw;tc++) {
      var wx=bsx+tc*T, wy=bsy+tr*T;
      if(tr===0) {
        if(tc===5)      dt(2,5,wx,wy,T,T);
        else if(tc===6) dt(3,5,wx,wy,T,T);
        else            dt(tc%3===0?4:tc%3===1?5:6,4,wx,wy,T,T);
      } else if(tr===1) {
        if(tc===4)      dt(5,5,wx,wy,T,T);
        else if(tc===5) dt(6,5,wx,wy,T,T);
        else            dt(tc%2===0?4:5,4,wx,wy,T,T);
      } else {
        dt(tc%3===0?4:tc%3===1?5:4,4,wx,wy,T,T);
      }
      // Specular highlight on top-left of each roof tile
      X.save();
      X.globalAlpha=0.18;
      X.fillStyle='#fff0e0';
      X.fillRect(wx,wy,T,1);
      X.fillRect(wx,wy,1,T);
      X.restore();
    }
  }

  // ── WALLS ─────────────────────────────────────────────────────────
  var wallStartRow=roofRows;
  var wallRows=fh-roofRows-1;
  for(var tr=0;tr<wallRows;tr++) {
    for(var tc=0;tc<fw;tc++) {
      var wx=bsx+tc*T, wy=bsy+(wallStartRow+tr)*T;
      if(tr===1&&(tc===1||tc===2||tc===8||tc===9)) {
        dt(tc%2===0?0:1,7,wx,wy,T,T);
      } else {
        dt(tc%3===0?4:tc%3===1?5:6,4,wx,wy,T,T);
      }
      // Specular left edge of each wall tile
      X.save();X.globalAlpha=0.12;X.fillStyle='#ffe0c0';
      X.fillRect(wx,wy,1,T);X.restore();
    }
  }

  // ── MODULE WINDOW GLOW ────────────────────────────────────────────
  // 4 windows (2 per side). Each glows warmer/brighter as module progress increases.
  // Window positions: wall row 1, cols 1,2,8,9
  var winDefs = [
    {tc:1, tr:wallStartRow+1, mod:'m1'},
    {tc:2, tr:wallStartRow+1, mod:'m2'},
    {tc:8, tr:wallStartRow+1, mod:'m3'},
    {tc:9, tr:wallStartRow+1, mod:'m4'},
  ];
  winDefs.forEach(function(w) {
    var prog = modProgress[w.mod]||0;
    var wx=bsx+w.tc*T, wy=bsy+w.tr*T;
    if(prog > 0.05) {
      // Glow intensity scales with progress
      var pulse = 0.7+0.3*Math.sin(fc*0.035+w.tc);
      var glowA = prog * 0.7 * pulse;
      X.save();
      var grd = X.createRadialGradient(wx+T/2,wy+T/2,0,wx+T/2,wy+T/2,T*2.5);
      grd.addColorStop(0, 'rgba(255,210,80,'+glowA+')');
      grd.addColorStop(0.5,'rgba(255,160,40,'+(glowA*0.4)+')');
      grd.addColorStop(1,  'rgba(255,120,0,0)');
      X.fillStyle=grd;
      X.fillRect(wx-T*2,wy-T*2,T*6,T*6);
      // Window bright centre
      X.globalAlpha=prog*0.8*pulse;
      X.fillStyle='#ffe090';
      X.fillRect(wx+2,wy+2,T-4,T-4);
      X.restore();
    }
    // Module label tiny text below window
    if(prog > 0) {
      X.save();
      X.globalAlpha=0.7;
      X.font='3px "Press Start 2P",monospace';
      X.textAlign='center';
      X.fillStyle=prog>=1?'#80c040':prog>0.5?'#c8901c':'#906050';
      X.fillText(w.mod.toUpperCase(),wx+T/2,wy+T+5);
      X.restore();
    }
  });

  // ── DOOR ──────────────────────────────────────────────────────────
  var doorRow=fh-1;
  for(var tc=0;tc<fw;tc++) {
    var wx=bsx+tc*T, wy=bsy+doorRow*T;
    if(tc===5)      dt(0,6,wx,wy,T,T);
    else if(tc===6) dt(1,6,wx,wy,T,T);
    else            dt(tc%2===0?4:5,4,wx,wy,T,T);
  }

  // ── WALL THICKNESS (bottom edge) ────────────────────────────────
  X.fillStyle='rgba(60,20,5,0.5)';
  X.fillRect(bsx, bsy+fh*T, fw*T, 4);
  // Right edge thickness
  X.fillStyle='rgba(60,20,5,0.35)';
  X.fillRect(bsx+fw*T, bsy+2*T, 5, fh*T-2*T);

  // ── LABEL ─────────────────────────────────────────────────────────
  X.font='5px "Press Start 2P",monospace';X.textAlign='center';
  X.fillStyle='rgba(6,4,2,0.7)';
  X.fillText('FARMHOUSE',bsx+fw*T/2+1,bsy+fh*T+14);
  X.fillStyle=P.hw4;
  X.fillText('FARMHOUSE',bsx+fw*T/2,bsy+fh*T+13);
}

function drawStudyTree() {
  // Study tree built from Tiny Town tree tiles
  // Stage 0: bare sticks (sapling)
  // Stage 1: single small tree tile
  // Stage 2-3: 2x2 tile medium tree
  // Stage 4-5: 3x3 tile large tree with flowers
  var stg = treeStage();
  var ox=27*T, oy=T;
  var p=sw(ox,oy);
  var bsx=p.sx, bsy=p.sy;
  var cx=bsx+2*T, cy=bsy+3*T;

  var tmLoaded = tmImg.complete&&tmImg.naturalWidth>0;

  // Trunk (always drawn)
  X.fillStyle=P.wd1;X.fillRect(cx-4,cy,8,2*T+8);
  for(var seg=0;seg<2*T+8;seg+=5) {
    X.fillStyle=seg%10===0?P.wd2:P.wd3;
    X.fillRect(cx-3,cy+seg,6,3);
  }

  if(stg===0) {
    // Bare sapling — small sticks
    X.fillStyle=P.wd2;
    X.fillRect(cx-10,cy-4,10,3);
    X.fillRect(cx,cy-8,8,3);
    // Stage label
    X.font='4px "Press Start 2P",monospace';X.textAlign='center';
    X.fillStyle='rgba(6,4,2,0.6)';X.fillText('SAPLING',cx+1,bsy+2*T+18);
    X.fillStyle=P.tr4;X.fillText('SAPLING',cx,bsy+2*T+17);
    return;
  }

  // Tree canopy using tileset tiles
  if(tmLoaded) {
    // Pick tree tile type based on stage
    // stg 1: single pine (5,0) at 1x scale
    // stg 2: single round green (4,1) at 2T
    // stg 3: 2x2 arrangement of mixed tiles at 2T
    // stg 4: 3x3 large tree at 3T
    // stg 5: 3x3 with autumn tile accents (full bloom)

    if(stg===1) {
      // Small tree — single tile at 2T
      X.drawImage(tmImg, 5*TM_ST,0, TM_TS,TM_TS, cx-T,cy-T*2, T*2,T*2);
    } else if(stg===2) {
      // Medium tree — 2x2 tiles
      X.drawImage(tmImg, 4*TM_ST,0, TM_TS,TM_TS, cx-T*1,cy-T*2, T*2,T*2);
      X.drawImage(tmImg, 5*TM_ST,0, TM_TS,TM_TS, cx+T*1,cy-T*2, T*2,T*2);
    } else if(stg===3) {
      // Growing — 2x2 with green round
      X.drawImage(tmImg, 5*TM_ST,1*TM_ST, TM_TS,TM_TS, cx-T*2,cy-T*3, T*2,T*2);
      X.drawImage(tmImg, 4*TM_ST,1*TM_ST, TM_TS,TM_TS, cx,    cy-T*3, T*2,T*2);
      X.drawImage(tmImg, 4*TM_ST,0,       TM_TS,TM_TS, cx-T,  cy-T,   T*2,T*2);
    } else if(stg===4) {
      // Full canopy — 3x2 arrangement
      for(var ti=0;ti<3;ti++) {
        X.drawImage(tmImg, 5*TM_ST,0, TM_TS,TM_TS, cx-T*3+ti*T*2,cy-T*4, T*2,T*2);
      }
      X.drawImage(tmImg, 4*TM_ST,1*TM_ST, TM_TS,TM_TS, cx-T*2,cy-T*2, T*2,T*2);
      X.drawImage(tmImg, 5*TM_ST,1*TM_ST, TM_TS,TM_TS, cx,    cy-T*2, T*2,T*2);
    } else {
      // Full bloom stg 5 — 3x3 with autumn accents
      for(var ti=0;ti<3;ti++) {
        X.drawImage(tmImg, 5*TM_ST,0, TM_TS,TM_TS, cx-T*3+ti*T*2,cy-T*5, T*2,T*2);
      }
      for(var ti=0;ti<2;ti++) {
        X.drawImage(tmImg, 4*TM_ST,1*TM_ST, TM_TS,TM_TS, cx-T*2+ti*T*3,cy-T*3, T*2,T*2);
      }
      // Autumn colour accents for "full bloom"
      X.drawImage(tmImg, 9*TM_ST,0, TM_TS,TM_TS, cx-T,cy-T*2, T*2,T*2);
      // Sparkle effect
      for(var sp=0;sp<4;sp++) {
        var spx=cx-T*2+sp*T+(Math.sin(fc*0.05+sp)*T*0.3)|0;
        var spy=cy-T*4+(Math.cos(fc*0.04+sp)*T*0.3)|0;
        var sparkA=0.4+0.6*Math.abs(Math.sin(fc*0.08+sp*1.5));
        X.save();X.globalAlpha=sparkA;
        X.fillStyle='#f8f060';
        X.fillRect(spx,spy,2,2);
        X.restore();
      }
    }
  } else {
    // Canvas fallback
    var szs=[0,16,24,34,44,54];
    var sz=szs[stg];
    var treeCol=['','#2a5010','#1e6014','#287018','#30801c','#38a020'][stg];
    X.fillStyle=P.tr1;X.fillRect(cx-sz/2-3,cy-sz-3,sz+6,sz+6);
    X.fillStyle=treeCol;X.fillRect(cx-sz/2,cy-sz,sz,sz);
  }

  // Shadow under tree
  X.save();X.globalAlpha=0.12;X.fillStyle='#1a1008';
  var shadowSz = [0,T,T*2,T*3,T*3.5,T*4][stg];
  X.beginPath();
  X.ellipse(cx+shadowSz*0.3, cy+4, shadowSz*0.8, shadowSz*0.25, 0,0,Math.PI*2);
  X.fill();X.restore();

  // Stage label
  var labels=['','Sapling','Budding','Growing','Canopy','Full Bloom'];
  X.font='4px "Press Start 2P",monospace';X.textAlign='center';
  X.fillStyle='rgba(6,4,2,0.6)';X.fillText(labels[stg],cx+1,bsy+2*T+18);
  X.fillStyle=P.tr4;X.fillText(labels[stg],cx,bsy+2*T+17);

  X.font='5px "Press Start 2P",monospace';
  X.fillStyle='rgba(6,4,2,0.7)';X.fillText('STUDY TREE',cx+1,bsy+2*T+10);
  X.fillStyle='#80c040';X.fillText('STUDY TREE',cx,bsy+2*T+9);
}

// ── CAVE (Tiny Town castle tiles) ────────────────────────────────────
function drawCave() {
  var ox=30*T, oy=27*T;
  var p=sw(ox,oy);
  var bsx=p.sx, bsy=p.sy;
  var cw=8, ch=7;
  var d=dpSt();
  var confPct = d.total>0 ? d.conf/d.total : 0;
  var unlocked = confPct >= 0.75;

  if(!tmImg.complete||tmImg.naturalWidth===0) {
    X.fillStyle=P.cs1;X.fillRect(bsx,bsy,cw*T,ch*T);
  } else {
    // ── WALLS ──────────────────────────────────────────────────────
    for(var tr=0;tr<ch;tr++) {
      for(var tc=0;tc<cw;tc++) {
        var wx=bsx+tc*T, wy=bsy+tr*T;
        var h=tileHash(tc+30,tr+27);
        if(tr===0) {
          dt(h%3===0?2:h%3===1?4:0,8,wx,wy,T,T);
        } else {
          dt(h%3===0?0:h%3===1?1:2,8,wx,wy,T,T);
        }
        // Specular top-left
        X.save();X.globalAlpha=0.12;X.fillStyle='#c0d0e0';
        X.fillRect(wx,wy,1,T);X.fillRect(wx,wy,T,1);
        X.restore();
      }
    }

    // ── ARCH ───────────────────────────────────────────────────────
    var archCol=Math.floor(cw/2)-1;
    var archRow=ch-4;
    dt(3,9, bsx+archCol*T,     bsy+archRow*T,     T,T);
    dt(4,9, bsx+(archCol+1)*T, bsy+archRow*T,     T,T);
    dt(3,10,bsx+archCol*T,     bsy+(archRow+1)*T, T,T);
    dt(4,10,bsx+(archCol+1)*T, bsy+(archRow+1)*T, T,T);
    X.fillStyle='#050308';
    X.fillRect(bsx+archCol*T+2, bsy+(archRow+1)*T+6, T*2-4, T-6);

    // ── VINES — recede as confidence builds ───────────────────────
    // At 0% confidence: vines cover most of the cave face
    // At 75%: vines have fully retracted
    // vineCount: 0-6 segments per side, based on 1 - confPct/0.75
    var vineCoverage = Math.max(0, 1 - confPct/0.75);
    var vineRows = Math.round(vineCoverage * 5); // 0-5 rows of vines

    for(var vi=0; vi<vineRows; vi++) {
      var vineY = bsy+T*(ch-1-vi);
      // Left side vines
      var vineDensity = vineCoverage;
      X.fillStyle = vi%2===0 ? P.cr2 : P.cr1;
      X.fillRect(bsx, vineY, Math.round(8*vineDensity), T-1);
      X.fillRect(bsx+2, vineY-3, Math.round(5*vineDensity), 4);
      // Right side vines
      X.fillRect(bsx+cw*T-Math.round(8*vineDensity), vineY, Math.round(8*vineDensity), T-1);
      X.fillRect(bsx+cw*T-Math.round(7*vineDensity), vineY-3, Math.round(5*vineDensity), 4);
    }

    // Progress indicator — how close to unlocking
    if(!unlocked && d.total > 0) {
      var pct = Math.round(confPct*100);
      var barW = cw*T-8;
      // Dark bg
      X.fillStyle='rgba(4,3,8,0.75)';
      X.fillRect(bsx+4, bsy+ch*T+2, barW, 8);
      // Progress fill
      var fillW = Math.round(barW * confPct/0.75);
      X.fillStyle = confPct>0.6?'#80c040':confPct>0.3?'#c8901c':'#c03020';
      X.fillRect(bsx+4, bsy+ch*T+2, fillW, 8);
      // Border
      X.strokeStyle='#5a4010';X.lineWidth=1;
      X.strokeRect(bsx+4,bsy+ch*T+2,barW,8);
      // Pct text
      X.font='4px "Press Start 2P",monospace';X.textAlign='center';
      X.fillStyle='#f0d060';
      X.fillText(pct+'% / 75%', bsx+cw*T/2, bsy+ch*T+18);
    }
  }

  // ── WALL THICKNESS ────────────────────────────────────────────────
  X.fillStyle='rgba(20,15,30,0.45)';
  X.fillRect(bsx+cw*T, bsy+T, 5, ch*T-T);
  X.fillRect(bsx+2, bsy+ch*T, cw*T-2, 4);

  // ── LABEL ─────────────────────────────────────────────────────────
  X.font='5px "Press Start 2P",monospace';X.textAlign='center';
  X.fillStyle='rgba(6,4,2,0.7)';
  X.fillText(unlocked?'CAVE':'CAVE (LOCKED)',bsx+cw*T/2+1,bsy+ch*T+10);
  X.fillStyle=P.cs3;
  X.fillText(unlocked?'CAVE':'CAVE (LOCKED)',bsx+cw*T/2,bsy+ch*T+9);
}

// ── VEGETABLE GARDEN ──────────────────────────────────────────────────
function drawGarden() {
  var ox=T, oy=14*T;
  var p=sw(ox,oy);
  var bsx=p.sx, bsy=p.sy;
  var gw=8*T, gh=8*T;

  // Soil base
  for(var row=0;row<gh;row+=4) {
    for(var col=0;col<gw;col+=4) {
      var v=(Math.floor(row/4)+Math.floor(col/4))%3;
      X.fillStyle=[P.dr1,P.dr2,P.dr3][v];
      X.fillRect(bsx+col,bsy+row,4,4);
    }
  }

  // Garden fence
  X.fillStyle=P.wd2;
  X.fillRect(bsx-2,bsy,2,gh);X.fillRect(bsx+gw,bsy,2,gh);
  X.fillRect(bsx,bsy-2,gw,2);X.fillRect(bsx,bsy+gh,gw,2);
  for(var i=0;i<=gh;i+=2*T) {
    X.fillStyle=P.wd1;
    X.fillRect(bsx-3,bsy+i,3,7);X.fillRect(bsx+gw,bsy+i,3,7);
  }

  // Specular on fence posts
  X.save();X.globalAlpha=0.2;X.fillStyle='#d0b080';
  X.fillRect(bsx-3,bsy,1,gh);X.restore();

  var bx=[bsx+3,bsx+T*4+3,bsx+3,bsx+T*4+3];
  var by=[bsy+3,bsy+3,bsy+T*4+3,bsy+T*4+3];

  CONFIG_ASSESSMENTS.forEach(function(a,i) {
    var dn=ST.at[a.key];

    // Bed soil
    for(var r=0;r<3;r++) {
      for(var c=0;c<T*4-8;c+=7) {
        X.fillStyle=r%2===0?P.dr1:P.dr3;
        X.fillRect(bx[i]+c,by[i]+r*7,7,3);
      }
    }

    if(dn) {
      // ── HARVESTED: full plants, bright and lush ─────────────────
      // Row markers
      for(var ri=0;ri<3;ri++) {
        X.fillStyle=P.wd2;
        X.fillRect(bx[i]+4+ri*(T+2),by[i]+1,T-4,T+4);
      }
      // Plant stems and leaves
      for(var ri=0;ri<3;ri++) {
        var stemX=bx[i]+6+ri*(T+2);
        // Stem
        X.fillStyle='#306010';
        X.fillRect(stemX+T/2-1,by[i]-2,2,T-2);
        // Leaves
        X.fillStyle='#50a020';
        X.fillRect(stemX,by[i]+2,6,4);
        X.fillRect(stemX+T-10,by[i]+5,6,4);
        // Fruit/flower
        X.fillStyle=i%2===0?P.cr4:'#f0d020';
        X.fillRect(stemX+T/2-2,by[i]-6,5,5);
      }
    } else {
      // ── NOT YET: seed markers or small shoots ───────────────────
      for(var si=0;si<4;si++) {
        X.fillStyle=P.wd2;
        X.fillRect(bx[i]+3+si*T-2,by[i]+2,2,T-4);
        X.fillStyle=P.cr2;
        X.fillRect(bx[i]+1+si*T-2,by[i]+T-7,5,8);
        // Tiny sprout tip
        X.fillStyle='#60b030';
        X.fillRect(bx[i]+2+si*T-2,by[i]+T-9,3,3);
      }
    }

    // AT label
    X.fillStyle='rgba(8,6,2,0.8)';
    X.fillRect(bx[i]+1,by[i]+T*3+1,24,10);
    X.fillStyle=dn?'#40a020':'#c8901c';
    X.font='4px "Press Start 2P",monospace';
    X.textAlign='left';
    X.fillText('AT'+(i+1),bx[i]+3,by[i]+T*3+9);
  });

  // Garden inner shadow (recessed look)
  X.save();
  var gs=X.createLinearGradient(bsx,bsy,bsx,bsy+12);
  gs.addColorStop(0,'rgba(0,0,0,0.2)');
  gs.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=gs;X.fillRect(bsx,bsy,gw,12);
  var gs2=X.createLinearGradient(bsx,bsy,bsx+12,bsy);
  gs2.addColorStop(0,'rgba(0,0,0,0.15)');
  gs2.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=gs2;X.fillRect(bsx,bsy,12,gh);
  X.restore();

  X.font='5px "Press Start 2P",monospace';X.textAlign='center';
  X.fillStyle='rgba(6,4,2,0.7)';X.fillText('GARDEN',bsx+gw/2+1,bsy+gh+10);
  X.fillStyle=P.cr3;X.fillText('GARDEN',bsx+gw/2,bsy+gh+9);
}

function drawWell() {
  var ox=26*T, oy=17*T;
  var p=sw(ox,oy);
  var bsx=p.sx, bsy=p.sy;
  var ww=4*T, wh=3*T;
  var lv=wellLv();
  for(var row=0;row<wh;row+=5) {
    for(var col=0;col<ww;col+=7) {
      var tone=(Math.floor(row/5)+Math.floor(col/7))%3;
      X.fillStyle=[P.co1,P.co2,P.co3][tone];
      X.fillRect(bsx+col,bsy+T+row,7,5);

// ── GRASS SWAY ─────────────────────────────────────────────────────────
function drawGrassSway() {
  // Draw swaying grass blades on top of the ground texture
  // Only in grass tiles, scattered at low density
  var c0=Math.max(0,Math.floor(cam.x/T));
  var c1=Math.min(COLS,Math.ceil((cam.x+VW)/T)+1);
  var r0=Math.max(0,Math.floor(cam.y/T));
  var r1=Math.min(ROWS,Math.ceil((cam.y+VH)/T)+1);

  for(var row=r0;row<r1;row++) {
    for(var col=c0;col<c1;col++) {
      var tileType=TM[row]?TM[row][col]:0;
      if(tileType!==0) continue;
      var h=tileHash(col,row);
      // Only ~15% of tiles get grass blades
      if(h%7!==0) continue;
      var p=sw(col*T,row*T);
      var gsx=p.sx, gsy=p.sy;
      // 2-3 blades per tile
      var bladeCount = 2+(h%2);
      for(var b=0;b<bladeCount;b++) {
        var bx = gsx + (h*3+b*7)%T;
        var by = gsy + T-4;
        // Sway angle based on time
        var sway = Math.sin(fc*0.02 + col*0.3 + row*0.4 + b*0.7) * 2;
        var bladeH = 4 + (h+b)%3;
        X.save();
        X.translate(bx+1, by+bladeH);
        X.rotate(sway*Math.PI/180*8);
        X.fillStyle = (h+b)%3===0?'#4a8c18':'#3a7010';
        X.fillRect(-1,-bladeH,2,bladeH);
        X.restore();
      }
    }
  }
}

function drawFallingLeaves() {
  leaves.forEach(function(leaf) {
    // Update position
    leaf.wobble += 0.03;
    leaf.x += leaf.vx + Math.sin(leaf.wobble)*0.3;
    leaf.y += leaf.vy;
    leaf.rot += leaf.rotV;

    // Wrap around world
    if(leaf.y > WH) { leaf.y = 0; leaf.x = Math.random()*WW; }
    if(leaf.x < 0)  { leaf.x = WW; }

    // Convert world to screen
    var sx = Math.round(leaf.x - cam.x);
    var sy = Math.round(leaf.y - cam.y);
    if(sx<-5||sx>VW+5||sy<-5||sy>VH+5) return;

    X.save();
    X.translate(sx,sy);
    X.rotate(leaf.rot);
    X.fillStyle = leaf.colour;
    X.fillRect(-leaf.size,-leaf.size,leaf.size*2,leaf.size);
    X.restore();
  });
}

var dustParticles = [];
var lastDustStep = 0;

function spawnDust() {
  if(!pl.moving) return;
  if(fc - lastDustStep < 8) return;
  lastDustStep = fc;
  // Only spawn on dirt/stone tiles
  var col = Math.floor(pl.x/T);
  var row = Math.floor(pl.y/T);
  var tileType = TM[row]?TM[row][col]:0;
  if(tileType!==1&&tileType!==2&&tileType!==3&&tileType!==4) return;
  for(var i=0;i<3;i++) {
    dustParticles.push({
      x: pl.x + T/2 + (Math.random()-0.5)*8,
      y: pl.y + T*1.8,
      vx: (Math.random()-0.5)*0.6,
      vy: -(0.3+Math.random()*0.4),
      life: 1.0,
      size: 1+Math.floor(Math.random()*2),
    });
  }
}

function drawDust() {
  spawnDust();
  var alive = [];
  dustParticles.forEach(function(d) {
    d.x += d.vx;
    d.y += d.vy;
    d.vy += 0.05; // gravity
    d.life -= 0.06;
    if(d.life <= 0) return;
    alive.push(d);
    var p = sw(d.x, d.y);
    X.save();
    X.globalAlpha = d.life * 0.5;
    X.fillStyle = '#c8b090';
    X.fillRect(p.sx, p.sy, d.size, d.size);
    X.restore();
  });
  dustParticles = alive;
}

// ── PROGRESS BAR GRADIENT ────────────────────────────────────────────
// Returns a CSS gradient string that goes red→amber→green based on pct
function pbGradient(pct) {
  // pct 0-100
  var r,g,b;
  if(pct < 50) {
    // Red to amber
    var t = pct/50;
    r=220; g=Math.round(60+t*100); b=20;
  } else {
    // Amber to green
    var t = (pct-50)/50;
    r=Math.round(220-t*160); g=Math.round(160+t*40); b=20;
  }
  var col = 'rgb('+r+','+g+','+b+')';
  var bright = 'rgb('+Math.min(255,r+40)+','+Math.min(255,g+40)+','+Math.min(255,b+20)+')';
  return 'linear-gradient(to right,'+bright+' 0%,'+col+' 100%)';
}

// Renders a small 16px tilemap tile as a data URL for use as modal icon
var _iconCache = {};
function tileIconURL(col,row) {
  var key=col+'_'+row;
  if(_iconCache[key]) return _iconCache[key];
  if(!tmImg.complete||tmImg.naturalWidth===0) return '';
  var c=document.createElement('canvas');
  c.width=16;c.height=16;
  var cx=c.getContext('2d');
  cx.imageSmoothingEnabled=false;
  cx.drawImage(tmImg,col*TM_ST,row*TM_ST,TM_TS,TM_TS,0,0,16,16);
  var url=c.toDataURL();
  _iconCache[key]=url;
  return url;
}

// ═══════════════════════════════════════════════════════════════════
//  3D DEPTH SYSTEM
//  Three passes that run after all objects are drawn:
//  1. drawObjectOutlines() — 1px dark border around every structure
//  2. draw3DSideFaces()    — rendered side faces giving isometric depth
//  3. drawPathEdges()      — inner shadow where paths meet grass
// ═══════════════════════════════════════════════════════════════════

function draw3DSideFaces() {
  // Draws a bottom face and right face on every major structure
  // giving them the illusion of physical thickness and isometric depth
  // Light source: top-left. Shadow faces: bottom + right.

  var structs = [
    // [worldX, worldY, widthTiles, heightTiles, depth, wallColour, faceColour]
    // Farmhouse
    {wx:2*T,  wy:T,    wt:11, ht:8, d:6,
     wall:'#b06040', face:'#8a3820', top:'#d08050'},
    // Cave
    {wx:30*T, wy:27*T, wt:8,  ht:7, d:5,
     wall:'#8090b0', face:'#505878', top:'#a0b0c0'},
    // Well
    {wx:26*T, wy:17*T, wt:4,  ht:5, d:4,
     wall:'#a09080', face:'#706050', top:'#c0b0a0'},
    // Market stall
    {wx:17*T, wy:11*T, wt:10, ht:5, d:4,
     wall:'#c07830', face:'#905020', top:'#e0a050'},
    // Mailbox post area
    {wx:17*T, wy:27*T, wt:3,  ht:3, d:3,
     wall:'#901808', face:'#601008', top:'#b02010'},
  ];

  structs.forEach(function(s) {
    var p = sw(s.wx, s.wy);
    var bsx=p.sx, bsy=p.sy;
    var fw=s.wt*T, fh=s.ht*T, d=s.d;

    // Bottom face (ground-facing, darker)
    X.fillStyle = s.face;
    X.beginPath();
    X.moveTo(bsx,    bsy+fh);
    X.lineTo(bsx+fw, bsy+fh);
    X.lineTo(bsx+fw+d, bsy+fh+d*0.5);
    X.lineTo(bsx+d,  bsy+fh+d*0.5);
    X.closePath();
    X.fill();
    // Bottom face highlight edge
    X.strokeStyle = 'rgba(0,0,0,0.4)';
    X.lineWidth = 1;
    X.stroke();

    // Right face (east-facing, medium shadow)
    X.fillStyle = s.face;
    X.beginPath();
    X.moveTo(bsx+fw,   bsy);
    X.lineTo(bsx+fw+d, bsy+d*0.5);
    X.lineTo(bsx+fw+d, bsy+fh+d*0.5);
    X.lineTo(bsx+fw,   bsy+fh);
    X.closePath();
    X.fill();
    X.strokeStyle = 'rgba(0,0,0,0.3)';
    X.lineWidth = 1;
    X.stroke();

    // Specular highlight on top-left corner
    X.save();
    X.globalAlpha = 0.25;
    X.fillStyle = '#ffffff';
    X.fillRect(bsx, bsy, fw, 2);
    X.fillRect(bsx, bsy, 2, fh);
    X.restore();
  });
}

function drawObjectOutlines() {
  // Draws a 1px dark outline around every major object
  // by drawing a slightly larger dark version first,
  // then the object renders on top (this function is called BEFORE drawing)
  // Actually we draw outlines as a post-pass using stroke rectangles

  X.save();
  X.strokeStyle = 'rgba(10,6,2,0.65)';
  X.lineWidth = 1.5;

  var outlineRects = [
    // [worldX, worldY, widthPx, heightPx]
    [2*T,   T,    11*T, 8*T],   // farmhouse
    [30*T,  27*T, 8*T,  7*T],   // cave
    [26*T,  17*T, 4*T,  5*T],   // well
    [17*T,  11*T, 10*T, 5*T],   // market stall
    [17*T,  27*T, 3*T,  3*T],   // mailbox area
    [T,     14*T, 8*T,  8*T],   // garden
  ];

  outlineRects.forEach(function(r) {
    var p = sw(r[0], r[1]);
    X.strokeRect(p.sx-0.5, p.sy-0.5, r[2]+1, r[3]+1);
  });

  X.restore();
}

function drawPathEdges() {
  // Draws an inner shadow on path tiles adjacent to grass
  // making the path look recessed/sunken into the ground
  var c0=Math.max(0,Math.floor(cam.x/T)-1);
  var c1=Math.min(COLS,Math.ceil((cam.x+VW)/T)+2);
  var r0=Math.max(0,Math.floor(cam.y/T)-1);
  var r1=Math.min(ROWS,Math.ceil((cam.y+VH)/T)+2);

  X.save();
  for(var row=r0;row<r1;row++) {
    for(var col=c0;col<c1;col++) {
      var tileType = TM[row]?TM[row][col]:0;
      if(tileType!==1&&tileType!==2) continue;
      var p=sw(col*T,row*T);
      var px=p.sx, py=p.sy;

      // Check each edge — if neighbour is grass, draw inner shadow
      // Top edge
      var above = TM[row-1]?TM[row-1][col]:0;
      if(above===0) {
        var g=X.createLinearGradient(px,py,px,py+5);
        g.addColorStop(0,'rgba(0,0,0,0.28)');
        g.addColorStop(1,'rgba(0,0,0,0)');
        X.fillStyle=g;
        X.fillRect(px,py,T,5);
      }
      // Left edge
      var left = TM[row]?TM[row][col-1]:0;
      if(left===0) {
        var g=X.createLinearGradient(px,py,px+5,py);
        g.addColorStop(0,'rgba(0,0,0,0.22)');
        g.addColorStop(1,'rgba(0,0,0,0)');
        X.fillStyle=g;
        X.fillRect(px,py,5,T);
      }
      // Right edge
      var right = TM[row]?TM[row][col+1]:0;
      if(right===0) {
        var g=X.createLinearGradient(px+T,py,px+T-5,py);
        g.addColorStop(0,'rgba(0,0,0,0.22)');
        g.addColorStop(1,'rgba(0,0,0,0)');
        X.fillStyle=g;
        X.fillRect(px+T-5,py,5,T);
      }
      // Bottom edge
      var below = TM[row+1]?TM[row+1][col]:0;
      if(below===0) {
        var g=X.createLinearGradient(px,py+T,px,py+T-5);
        g.addColorStop(0,'rgba(0,0,0,0.22)');
        g.addColorStop(1,'rgba(0,0,0,0)');
        X.fillStyle=g;
        X.fillRect(px,py+T-5,T,5);
      }
    }
  }
  X.restore();
}

function drawSpecularPass() {
  // Draws bright specular highlights on top-left corners of stone tiles
  // and shimmer on water, giving a lit-from-top-left impression
  var c0=Math.max(27,Math.floor(cam.x/T));
  var c1=Math.min(36,Math.ceil((cam.x+VW)/T)+1);
  var r0=Math.max(0,Math.floor(cam.y/T));
  var r1=Math.min(7,Math.ceil((cam.y+VH)/T)+1);

  X.save();
  // Water specular — moving bright flecks
  for(var row=r0;row<r1;row++) {
    for(var col=c0;col<c1;col++) {
      if((TM[row]?TM[row][col]:0)!==5) continue;
      var p=sw(col*T,row*T);
      // Top-left corner specular
      X.globalAlpha = 0.18;
      X.fillStyle = '#a0e0ff';
      X.fillRect(p.sx, p.sy, 3, 1);
      X.fillRect(p.sx, p.sy, 1, 3);
    }
  }
  X.restore();
}

// ── SHADOWS ───────────────────────────────────────────────────────────
function drawShadows() {
  X.save();
  X.globalAlpha = 0.22;
  X.fillStyle = '#1a1008';
  var SX = 0.6;
  var SY = 0.5;
  var structures = [
    [2*T,   T,    11*T, 8*T,  5*T],
    [28*T,  T,    5*T,  5*T,  3*T],
    [30*T,  27*T, 8*T,  7*T,  4*T],
    [26*T,  17*T, 5*T,  5*T,  2*T],
    [17*T,  11*T, 10*T, 5*T,  3*T],
    [17*T,  27*T, 3*T,  3*T,  1*T],
  ];
  structures.forEach(function(s) {
    var wx=s[0],wy=s[1],ww=s[2],wh=s[3],sl=s[4];
    var p=sw(wx,wy);
    var bsx=p.sx,bsy=p.sy;
    X.beginPath();
    X.moveTo(bsx,         bsy+wh);
    X.lineTo(bsx+ww,      bsy+wh);
    X.lineTo(bsx+ww+sl*SX,bsy+wh+sl*SY);
    X.lineTo(bsx+sl*SX,   bsy+wh+sl*SY);
    X.closePath();
    X.fill();
    X.beginPath();
    X.moveTo(bsx+ww,      bsy);
    X.lineTo(bsx+ww,      bsy+wh);
    X.lineTo(bsx+ww+sl*SX,bsy+wh+sl*SY);
    X.lineTo(bsx+ww+sl*SX,bsy+sl*SY);
    X.closePath();
    X.fill();
  });
  var stg=treeStage();
  if(stg>0) {
    var szs=[0,20,28,38,48,58];
    var sz=szs[stg];
    var tp=sw(28*T+2*T,T+3*T);
    X.globalAlpha=0.18;
    X.beginPath();
    X.ellipse(tp.sx+sz*0.6,tp.sy+sz*1.1,sz*0.9,sz*0.3,0,0,Math.PI*2);
    X.fill();
  }
  X.restore();
}

// ── SYDNEY REAL-TIME LIGHTING ────────────────────────────────────────
// Uses the actual current time in Sydney (AEST/AEDT, auto DST)
// Returns fractional hour 0-24 as a 0-1 value for lighting calculations

function getSydneyHour() {
  // Demo mode: cycle through all times of day rapidly (~30s per full cycle)
  if(typeof CONFIG_DEMO_MODE !== 'undefined' && CONFIG_DEMO_MODE) {
    return (fc * 24 / 1800) % 24; // full 24hr cycle in 1800 frames (~30s)
  }
  // Normal: actual Sydney time (handles daylight saving automatically)
  var now = new Date();
  var sydneyTime = new Date(now.toLocaleString('en-AU', {timeZone:'Australia/Sydney'}));
  return sydneyTime.getHours() + sydneyTime.getMinutes()/60 + sydneyTime.getSeconds()/3600;
}

function getLightingState(hour) {
  // Returns lighting parameters based on Sydney hour
  // hour: 0-24 fractional
  var state = {
    tintR:0, tintG:0, tintB:0, tintA:0,
    darknessA:0,     // overall darkness overlay
    vignetteA:0.35,  // always some vignette
    windowGlow:false,
    stars:false,
    label:''
  };

  if(hour>=5.5 && hour<7) {
    // Dawn 5:30-7:00 — warm pink-orange, fading in
    var t=(hour-5.5)/1.5;
    state.tintR=255;state.tintG=160;state.tintB=80;
    state.tintA=0.18*(1-t);
    state.darknessA=0.3*(1-t);
    state.windowGlow=true;
    state.label='Dawn';
  } else if(hour>=7 && hour<10) {
    // Morning 7:00-10:00 — clear, slight warm
    var t=(hour-7)/3;
    state.tintR=255;state.tintG=220;state.tintB=160;
    state.tintA=0.06*(1-t*0.8);
    state.label='Morning';
  } else if(hour>=10 && hour<15) {
    // Day 10:00-15:00 — neutral, full brightness
    state.tintA=0;
    state.label='Day';
  } else if(hour>=15 && hour<17) {
    // Afternoon 15:00-17:00 — golden warmth building
    var t=(hour-15)/2;
    state.tintR=255;state.tintG=200;state.tintB=80;
    state.tintA=0.08*t;
    state.label='Afternoon';
  } else if(hour>=17 && hour<19.5) {
    // Evening 17:00-19:30 — amber glow, windows lit
    var t=(hour-17)/2.5;
    state.tintR=255;state.tintG=130;state.tintB=40;
    state.tintA=0.18*Math.sin(t*Math.PI*0.8);
    state.darknessA=0.1*t;
    state.windowGlow=true;
    state.label='Evening';
  } else if(hour>=19.5 && hour<20.5) {
    // Dusk 19:30-20:30 — purple transition
    var t=(hour-19.5)/1;
    state.tintR=80;state.tintG=60;state.tintB=160;
    state.tintA=0.2*t;
    state.darknessA=0.25*t;
    state.windowGlow=true;
    state.label='Dusk';
  } else if(hour>=20.5 || hour<5.5) {
    // Night 20:30-5:30 — darkness, stars, window glow
    state.darknessA=0.72;
    state.tintR=20;state.tintG=20;state.tintB=60;
    state.tintA=0.3;
    state.windowGlow=true;
    state.stars=true;
    state.vignetteA=0.6;
    state.label='Night';
  }
  return state;
}

var cachedHour = -1;
var cachedState = null;
var hourUpdateTimer = 0;

function drawAtmosphere() {
  // Update Sydney hour every 300 frames (~5 seconds at 60fps)
  hourUpdateTimer++;
  if(hourUpdateTimer > 300 || cachedState===null) {
    cachedHour = getSydneyHour();
    cachedState = getLightingState(cachedHour);
    hourUpdateTimer = 0;
  }
  var ls = cachedState;

  // ── STARS (night only) ────────────────────────────────────────────
  if(ls.stars) {
    X.save();
    X.globalAlpha = 0.7;
    // Draw static stars in the upper portion of the viewport
    var starSeeds = [
      [40,8],[120,15],[200,6],[340,12],[460,4],[560,18],[620,9],[80,22],
      [160,28],[280,20],[400,8],[520,25],[640,14],[30,35],[300,30]
    ];
    starSeeds.forEach(function(s) {
      var sx=s[0], sy=s[1];
      // Twinkle effect
      var twinkle = 0.4+0.6*Math.abs(Math.sin(fc*0.03+sx*0.1));
      X.globalAlpha = twinkle * 0.8;
      X.fillStyle = '#ffffff';
      X.fillRect(sx, sy, 1+(sx%2), 1+(sy%2));
    });
    X.restore();
  }

  // ── TIME OF DAY TINT ─────────────────────────────────────────────
  if(ls.tintA > 0.005) {
    X.save();
    X.globalAlpha = ls.tintA;
    X.fillStyle = 'rgb('+ls.tintR+','+ls.tintG+','+ls.tintB+')';
    X.fillRect(0, 0, VW, VH);
    X.restore();
  }

  // ── DARKNESS OVERLAY ──────────────────────────────────────────────
  if(ls.darknessA > 0.01) {
    X.save();
    X.globalAlpha = ls.darknessA;
    X.fillStyle = '#05040a';
    X.fillRect(0, 0, VW, VH);
    X.restore();
  }

  // ── WINDOW GLOW (evening/night) ───────────────────────────────────
  if(ls.windowGlow) {
    drawWindowGlow();
  }

  // ── LANTERN RADIUS (night — player carries a lantern) ────────────
  if(ls.darknessA > 0.3) {
    drawLanternLight();
  }

  // ── DEPTH DARKENING — far edge of viewport ────────────────────────
  X.save();
  var dg = X.createLinearGradient(0,0,0,VH*0.3);
  dg.addColorStop(0, 'rgba(0,0,0,0.22)');
  dg.addColorStop(0.6, 'rgba(0,0,0,0.06)');
  dg.addColorStop(1, 'rgba(0,0,0,0)');
  X.fillStyle = dg;
  X.fillRect(0, 0, VW, VH*0.3);
  X.restore();

  // ── VIGNETTE ─────────────────────────────────────────────────────
  X.save();
  var vg = X.createRadialGradient(VW/2,VH/2,VH*0.25,VW/2,VH/2,VH*0.82);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(0.65, 'rgba(0,0,0,0.04)');
  vg.addColorStop(1, 'rgba(0,0,0,'+ls.vignetteA+')');
  X.fillStyle = vg;
  X.fillRect(0, 0, VW, VH);
  X.restore();

  // ── HUD TIME LABEL ────────────────────────────────────────────────
  if(ls.label) {
    X.save();
    X.globalAlpha = 0.7;
    X.font = '5px "Press Start 2P",monospace';
    X.textAlign = 'right';
    X.fillStyle = '#f0d060';
    // Format Sydney time
    var h = Math.floor(cachedHour);
    var m = Math.floor((cachedHour-h)*60);
    var ampm = h>=12?'PM':'AM';
    var h12 = h%12||12;
    X.fillText('SYDNEY '+h12+':'+(m<10?'0':'')+m+ampm+' '+ls.label.toUpperCase(),
               VW-6, VH-8);
    X.restore();
  }
}

function drawWindowGlow() {
  // Warm light emitting from farmhouse windows
  var fhp = sw(2*T, T);
  // Two windows on the farmhouse
  var wins = [
    [fhp.sx+T*2,   fhp.sy+T*4],
    [fhp.sx+T*8,   fhp.sy+T*4],
  ];
  wins.forEach(function(w) {
    var wx=w[0], wy=w[1];
    // Glow radius
    X.save();
    var glow = X.createRadialGradient(wx+T/2, wy+T/2, 0, wx+T/2, wy+T/2, T*3);
    var pulse = 0.85 + 0.15*Math.sin(fc*0.04);
    glow.addColorStop(0,   'rgba(255,200,80,'+(0.35*pulse)+')');
    glow.addColorStop(0.4, 'rgba(255,160,40,'+(0.15*pulse)+')');
    glow.addColorStop(1,   'rgba(255,120,0,0)');
    X.fillStyle = glow;
    X.fillRect(wx-T*2, wy-T*2, T*6, T*6);
    // Window itself — bright yellow
    X.globalAlpha = 0.7*pulse;
    X.fillStyle = '#ffe080';
    X.fillRect(wx+2, wy+2, T-4, T-4);
    X.restore();
  });

  // Well — faint blue-green water glow
  var wp = sw(26*T, 17*T);
  X.save();
  var wellGlow = X.createRadialGradient(wp.sx+2*T, wp.sy+2*T, 0, wp.sx+2*T, wp.sy+2*T, T*2.5);
  wellGlow.addColorStop(0,   'rgba(80,160,220,0.25)');
  wellGlow.addColorStop(1,   'rgba(80,160,220,0)');
  X.fillStyle = wellGlow;
  X.fillRect(wp.sx, wp.sy, T*5, T*5);
  X.restore();
}

function drawLanternLight() {
  // Player carries a lantern at night — circular light radius
  // Cave is ALWAYS dark regardless of time
  var pp = sw(pl.x+T, pl.y+T);
  var nearCave = pl.x>28*T && pl.y>25*T;

  // Draw darkness with a hole punched out around player
  // Method: fill entire screen with darkness, then use
  // destination-out composite to cut the lantern circle

  X.save();
  // Create a temp canvas for the darkness mask
  var darkCanvas = document.createElement('canvas');
  darkCanvas.width = VW; darkCanvas.height = VH;
  var DC = darkCanvas.getContext('2d');

  // Fill with darkness
  DC.fillStyle = '#030208';
  DC.fillRect(0,0,VW,VH);

  // Cut out lantern radius using gradient
  DC.globalCompositeOperation = 'destination-out';
  var lanternRadius = nearCave ? T*2 : T*8;
  var lanternGlow = DC.createRadialGradient(pp.sx, pp.sy, 0, pp.sx, pp.sy, lanternRadius);
  lanternGlow.addColorStop(0,   'rgba(0,0,0,1)');
  lanternGlow.addColorStop(0.5, 'rgba(0,0,0,0.85)');
  lanternGlow.addColorStop(0.8, 'rgba(0,0,0,0.3)');
  lanternGlow.addColorStop(1,   'rgba(0,0,0,0)');
  DC.fillStyle = lanternGlow;
  DC.fillRect(0,0,VW,VH);

  // Blit the masked darkness onto the main canvas
  X.globalAlpha = 0.88;
  X.drawImage(darkCanvas, 0,0);
  X.restore();

  // Warm lantern colour tint at centre
  X.save();
  var warmGlow = X.createRadialGradient(pp.sx, pp.sy, 0, pp.sx, pp.sy, T*4);
  warmGlow.addColorStop(0,   'rgba(255,180,60,0.12)');
  warmGlow.addColorStop(0.5, 'rgba(255,140,40,0.06)');
  warmGlow.addColorStop(1,   'rgba(255,100,0,0)');
  X.fillStyle = warmGlow;
  X.fillRect(0,0,VW,VH);
  X.restore();
}

// ══════════════════════════════════════════════════════════════════════
//  MAIN GAME LOOP

function loop() {
  fc++;
  updatePlayer();
  updateCam();
  X.clearRect(0,0,VW,VH);

  // Draw order: ground → paths → water → objects → structures → 3D → NPC → player → overlays
  drawGround();
  drawPaths();
  drawPathEdges();
  drawWater();
  drawFence();
  drawBgTrees();
  drawRocks();
  drawMushrooms();
  drawFlowers();
  drawHayBales();
  drawBarrels();
  drawLogPile();
  drawScarecrow();
  drawMarketStall();
  drawGarden();
  drawFarmhouse();
  drawStudyTree();
  drawWell();
  drawCave();
  drawMailbox();
  drawGrassSway();
  drawFallingLeaves();
  drawButterflies();
  drawLabels();
  drawNPC();
  drawDust();
  draw3DSideFaces();
  drawObjectOutlines();
  drawSpecularPass();
  drawShadows();
  drawAtmosphere();
  drawPlayer();
  updateHint();
  drawMinimap();

  requestAnimationFrame(loop);
}
loop();
