<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mr Glass' Garden — Year 11 Biology</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated;image-rendering:crisp-edges;}
body{background:#0d0a06;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:16px 0;font-family:'Press Start 2P',monospace;}
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
#gw{position:relative;width:680px;}
#gc{display:block;width:680px;height:440px;border:3px solid #8b6010;cursor:default;}
#hud{background:#0d0a06;border:3px solid #8b6010;border-top:none;padding:5px 10px;display:flex;justify-content:space-between;align-items:center;}
.hl{color:#f0d060;font-size:6px;letter-spacing:1px;}.hr{color:#80c040;font-size:6px;}
#ih{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);background:rgba(13,10,6,0.97);border:2px solid #c8901c;color:#f0d060;font-size:6px;padding:6px 16px;pointer-events:none;white-space:nowrap;display:none;animation:ihpulse 1.2s ease-in-out infinite;}
@keyframes ihpulse{0%,100%{border-color:#c8901c;color:#f0d060;}50%{border-color:#f0d060;color:#fff8a0;}}
#minimap{position:absolute;top:8px;right:8px;border:2px solid #5a4010;background:rgba(13,10,6,0.9);}
#seasonbadge{position:absolute;top:8px;left:8px;background:rgba(13,10,6,0.88);border:1px solid #5a4010;color:#f0d060;font-size:5px;padding:3px 6px;}
#toast{position:absolute;top:36px;left:50%;transform:translateX(-50%);background:rgba(13,10,6,0.97);border:2px solid #80c040;color:#80c040;font-size:5.5px;padding:5px 12px;display:none;white-space:nowrap;z-index:5;}
#dialog{position:absolute;bottom:6px;left:6px;right:6px;background:rgba(10,8,4,0.97);border:2px solid #c8901c;padding:8px 12px;display:none;min-height:48px;z-index:4;}
#dname{color:#f0d060;font-size:5.5px;margin-bottom:5px;}
#dtext{color:#c0a870;font-size:5px;line-height:2;}
#dcont{color:#7a5828;font-size:4.5px;margin-top:4px;}
/* Auth screen */
#auth-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(8,6,2,0.98);z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#auth-title{color:#f0d060;font-size:10px;margin-bottom:8px;}
#auth-sub{color:#7a5828;font-size:6px;margin-bottom:16px;}
.auth-field{background:#100c04;border:2px solid #5a4010;color:#f0d060;font-family:inherit;font-size:6px;padding:6px 10px;width:240px;outline:none;}
.auth-field:focus{border-color:#c8901c;}
.auth-btn{background:#2a1c04;border:2px solid #c8901c;color:#f0d060;font-family:inherit;font-size:6px;padding:6px 20px;cursor:pointer;width:240px;}
.auth-btn:hover{background:#3a2808;}
#auth-err{color:#d04030;font-size:5px;min-height:14px;}
#auth-toggle{color:#7a5828;font-size:5px;cursor:pointer;text-decoration:underline;}
/* Modal */
#mo{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(4,3,1,0.94);z-index:10;align-items:center;justify-content:center;}
#mo.open{display:flex;}
#mb{background:#1a1206;border:3px solid #c8901c;width:93%;max-width:600px;max-height:90%;display:flex;flex-direction:column;}
#mh{background:#241808;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #7a5808;}
#mt{color:#f0d060;font-size:7px;}
#mc{background:#501008;border:2px solid #c03010;color:#f0d060;font-size:6px;padding:4px 8px;cursor:pointer;font-family:inherit;}
#mc:hover{background:#6a1810;}
#mbody{overflow-y:auto;padding:12px 14px;flex:1;scrollbar-width:thin;scrollbar-color:#7a5808 #100c04;}
#mbody::-webkit-scrollbar{width:5px;}
#mbody::-webkit-scrollbar-track{background:#100c04;}
#mbody::-webkit-scrollbar-thumb{background:#7a5808;}
/* Modal content styles */
.mr{margin-bottom:14px;}.mrt{color:#80c040;font-size:6.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #3a2804;}
.iql{color:#f0d060;font-size:5.5px;margin:8px 0 4px;}
.dp{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;cursor:pointer;padding:4px;border:1px solid #1e1404;transition:all 0.1s;}
.dp:hover{border-color:#80c040;background:#121004;}
.dps{flex-shrink:0;width:13px;height:13px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:7px;}
.dps.none{border-color:#3a2804;background:#0a0804;}.dps.prog{border-color:#c8901c;background:#180e00;color:#c8901c;}.dps.conf{border-color:#80c040;background:#081404;color:#80c040;}
.dpt{color:#b09060;font-size:5px;line-height:1.8;}
.sl{display:flex;gap:10px;margin-bottom:10px;}.sli{display:flex;align-items:center;gap:3px;color:#5a4820;font-size:5px;}
.sld{width:9px;height:9px;border:2px solid;}.sld.none{border-color:#3a2804;}.sld.prog{border-color:#c8901c;background:#180e00;}.sld.conf{border-color:#80c040;background:#081404;}
.ts{margin-bottom:10px;}.tt{color:#80c040;font-size:6.5px;margin-bottom:6px;}
.qi{display:flex;justify-content:space-between;align-items:center;padding:5px 7px;border:1px solid #1e1404;margin-bottom:3px;cursor:pointer;transition:all 0.1s;}
.qi:hover{border-color:#80c040;background:#121004;}
.ql{color:#b09060;font-size:5px;}.qc{width:13px;height:13px;border:2px solid #3a2804;display:flex;align-items:center;justify-content:center;font-size:8px;color:#80c040;}
.qc.done{background:#081404;border-color:#80c040;}
.gb{border:2px solid #3a2804;padding:9px;margin-bottom:9px;background:#100c04;}
.gbt{color:#f0d060;font-size:6.5px;margin-bottom:5px;}.gbs{color:#5a4820;font-size:5px;margin-bottom:7px;}
.gbb{background:#182404;border:2px solid #80c040;color:#80c040;font-size:5.5px;padding:4px 9px;cursor:pointer;font-family:inherit;}
.gbb:hover{background:#223008;}.gbb.done{background:#081404;color:#408020;border-color:#408020;cursor:default;}
.wi{display:flex;justify-content:space-between;align-items:center;padding:5px 7px;border:1px solid #1e1404;margin-bottom:3px;cursor:pointer;}
.wi:hover{border-color:#80c040;background:#121004;}
.mi{background:#08081a;border:1px solid #303068;padding:7px 9px;margin-bottom:7px;}
.mif{color:#5858a0;font-size:5px;margin-bottom:2px;}.mis{color:#f0d060;font-size:5.5px;margin-bottom:3px;}.mib{color:#8090b0;font-size:5px;line-height:1.8;}
.min{border-color:#6868c0;}
.pb{height:7px;background:#0a0804;border:1px solid #3a2804;margin-top:3px;overflow:hidden;}
.pbf{height:100%;background:#80c040;transition:width 0.5s ease;}
.sr{display:flex;gap:7px;margin-bottom:9px;}.sc{flex:1;background:#100c04;border:1px solid #3a2804;padding:5px 7px;}
.scl{color:#5a4820;font-size:4.5px;margin-bottom:2px;}.scv{color:#f0d060;font-size:8px;}
.pnote{color:#5a4820;font-size:5px;margin:5px 0 10px;}
.sync-status{color:#5a4820;font-size:4.5px;text-align:right;margin-top:4px;}
</style>
</head>
<body>
<div id="gw">
  <canvas id="gc" width="680" height="440"></canvas>
  <canvas id="minimap" width="80" height="80"></canvas>
  <div id="seasonbadge">🌱 SPRING · TERM 1</div>
  <div id="hud">
    <div class="hl">MR GLASS' GARDEN &nbsp;·&nbsp; YR 11 BIOLOGY</div>
    <div class="hr" id="hr">WASD · E=INTERACT · SPACE=NEXT</div>
  </div>
  <span id="ih"></span>
  <div id="toast"></div>
  <div id="dialog">
    <div id="dname"></div>
    <div id="dtext"></div>
    <div id="dcont">[SPACE] to continue</div>
  </div>
  <div id="auth-screen">
    <div id="auth-title">MR GLASS' GARDEN</div>
    <div id="auth-sub">YEAR 11 BIOLOGY · 2025</div>
    <input class="auth-field" id="auth-email" type="email" placeholder="School email address">
    <input class="auth-field" id="auth-pass" type="password" placeholder="Password">
    <button class="auth-btn" id="auth-submit">ENTER THE GARDEN</button>
    <div id="auth-err"></div>
    <span id="auth-toggle">Need an account? Sign up</span>
  </div>
  <div id="mo"><div id="mb">
    <div id="mh"><span id="mt"></span><button id="mc">✕ CLOSE</button></div>
    <div id="mbody"></div>
  </div></div>
</div>

let SB_TOKEN=null, SB_USER=null;

async function sbFetch(path,opts={}){
  const headers={'apikey':SB_KEY,'Content-Type':'application/json',...(SB_TOKEN?{'Authorization':'Bearer '+SB_TOKEN}:{}),...(opts.headers||{})};
  const r=await fetch(SB_URL+path,{...opts,headers});
  return r;
}
async function sbSignIn(email,pass){
  const r=await sbFetch('/auth/v1/token?grant_type=password',{method:'POST',body:JSON.stringify({email,password:pass})});
  const d=await r.json();
  if(d.error)throw new Error(d.error_description||d.error);
  SB_TOKEN=d.access_token; SB_USER=d.user;
  return d;
}
async function sbSignUp(email,pass){
  const r=await sbFetch('/auth/v1/signup',{method:'POST',body:JSON.stringify({email,password:pass})});
  const d=await r.json();
  if(d.error)throw new Error(d.error_description||d.error);
  SB_TOKEN=d.access_token; SB_USER=d.user;
  return d;
}
async function sbLoadProgress(){
  const r=await sbFetch('/rest/v1/student_progress?user_id=eq.'+SB_USER.id+'&select=*');
  const d=await r.json();
  return d.length>0?d[0]:null;
}
async function sbSaveProgress(data){
  const payload={user_id:SB_USER.id,display_name:SB_USER.email.split('@')[0],...data,updated_at:new Date().toISOString()};
  await sbFetch('/rest/v1/student_progress',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(payload)});
}

// ── HERO SPRITE ──────────────────────────────────────────────────
// hero.png: 48x64, 3 cols x 4 rows at 16px
// Row 0=north, 1=west, 2=south, 3=east. Col 1=idle, 0&2=walk frames
const HTILE=16;
function drawHero(row,col,dx,dy,sc,flipX){
  if(!heroImg.complete)return;
  X.save();
  X.translate(flipX?dx+HTILE*sc:dx,dy);
  if(flipX)X.scale(-1,1);
  X.drawImage(heroImg,col*HTILE,row*HTILE,HTILE,HTILE,0,0,HTILE*sc,HTILE*sc);
  X.restore();
}
function drawNPC(row,col,dx,dy,sc){
  if(!npcImg.complete)return;
  X.drawImage(npcImg,col*16,row*16,16,16,dx,dy,16*sc,16*sc);
}

// ── GRASS TILE ───────────────────────────────────────────────────
// Grass tiles are 48x48 seamless. Tile them across the ground.
function drawGrassTile(img,dx,dy,size){
  if(!img.complete)return;
  X.drawImage(img,0,0,48,48,dx,dy,size,size);
}

// ── PATH TILE ────────────────────────────────────────────────────
// path atlas: 6 cols x 3 rows of 32px tiles from PathAndObjects rows 3-5
const PTILE=32;
function drawPathTile(ac,ar,dx,dy,sc){
  if(!pathImg.complete)return;
  X.drawImage(pathImg,ac*PTILE,ar*PTILE,PTILE,PTILE,dx,dy,PTILE*(sc||1),PTILE*(sc||1));
}

// ── WORLD DRAWING ─────────────────────────────────────────────────
function drawGround(){
  const c0=Math.max(0,Math.floor(cam.x/T)),c1=Math.min(MCOLS,Math.ceil((cam.x+VW)/T)+1);
  const r0=Math.max(0,Math.floor(cam.y/T)),r1=Math.min(MROWS,Math.ceil((cam.y+VH)/T)+1);
  const gImgs=[g1Img,g2Img,g3Img];
  for(let row=r0;row<r1;row++)for(let col=c0;col<c1;col++){
    const {sx,sy}=sw(col*T,row*T);
    if(loaded>=6){
      const gi=gImgs[(row*7+col*13)%3];
      if(gi.complete&&gi.naturalWidth>0){
        X.drawImage(gi,0,0,48,48,sx,sy,T,T);
        continue;
      }
    }
    const v=(row*17+col*13+row*col)%16;
    X.fillStyle=v<7?P.g1:v<11?P.g2:v<14?P.g3:'#6ab030';X.fillRect(sx,sy,T,T);
  }
}

function drawPaths(){
  // Vertical path cols 10-13
  for(let row=0;row<MROWS;row++)for(let col=10;col<14;col++){
    const {sx,sy}=sw(col*T,row*T);
    if(loaded>=6&&pathImg.complete&&pathImg.naturalWidth>0){
      const ac=(col-10)%3,ar=Math.floor(row*0.5)%3;
      drawPathTile(ac,ar,sx,sy);
    } else {
      X.fillStyle=P.d2;X.fillRect(sx,sy,T,T);

  // Horizontal path rows 19-22
  for(let row=19;row<23;row++)for(let col=0;col<MCOLS;col++){
    const {sx,sy}=sw(col*T,row*T);
    if(loaded>=6&&pathImg.complete&&pathImg.naturalWidth>0){
      const ac=col%3,ar=(row-19+1)%3;
      drawPathTile(ac,ar,sx,sy);
    } else {
      X.fillStyle=P.d2;X.fillRect(sx,sy,T,T);

  // Pebbles
  [[11,20],[12,21],[13,20],[10,22]].forEach(([pc,pr2])=>{
    const {sx,sy}=sw(pc*T+6,pr2*T+8);X.fillStyle=P.st4;X.fillRect(sx,sy,5,4);X.fillStyle=P.st5;X.fillRect(sx+1,sy,3,2);

function drawFence(){

    X.fillStyle=P.fe2;X.fillRect(sx,sy,T,5);X.fillStyle=P.fe3;X.fillRect(sx,sy,T,2);
    X.fillStyle=P.fe2;X.fillRect(sx2,sy2,T,5);X.fillStyle=P.fe3;X.fillRect(sx2,sy2,T,2);

    X.fillStyle=P.fe2;X.fillRect(sx,sy,5,T);X.fillStyle=P.fe3;X.fillRect(sx,sy,2,T);
    X.fillStyle=P.fe2;X.fillRect(sx2,sy2,5,T);X.fillStyle=P.fe3;X.fillRect(sx2,sy2,2,T);

function drawBgTrees(){[[1,2],[1,11],[1,20],[28,3],[28,13],[28,22],[2,27],[28,27]].forEach(([tc,tr])=>{const {sx,sy}=sw(tc*T,tr*T);X.fillStyle=P.t1;X.fillRect(sx+6,sy+22,12,T+8);X.fillStyle=P.t2;X.fillRect(sx+8,sy+20,8,T+4);X.fillStyle=P.t1;X.fillRect(sx,sy+8,T+4,T);X.fillStyle=P.t2;X.fillRect(sx+2,sy+6,T,T);X.fillStyle=P.t3;X.fillRect(sx+6,sy+4,T-8,T-4);X.fillStyle=P.t4;X.fillRect(sx+10,sy+2,T-16,T/2);});}
function drawRocks(){[[3,13],[9,14],[20,12],[25,12]].forEach(([rc,rr])=>{const {sx,sy}=sw(rc*T,rr*T);X.fillStyle=P.st1;X.fillRect(sx+4,sy+10,20,12);X.fillStyle=P.st2;X.fillRect(sx+6,sy+6,16,10);X.fillStyle=P.st3;X.fillRect(sx+8,sy+5,12,7);X.fillStyle=P.st4;X.fillRect(sx+10,sy+6,6,4);X.fillStyle=P.shd;X.fillRect(sx+5,sy+20,20,4);});}
function drawFlowers(){[[4,13],[9,14],[19,13],[22,24],[8,25],[3,7],[15,11]].forEach(([fc2,fr])=>{const {sx,sy}=sw(fc2*T+6,fr*T+8);const v=(fc2*3+fr*7)%5;const [p1,p2]=v===0?['#d03060','#f8d030']:v===1?['#f0d020','#fff0a0']:v===2?['#f0f0e8','#f8d030']:v===3?['#8030b0','#f8d030']:['#d03060','#f0f0f0'];X.fillStyle=P.c2;X.fillRect(sx+5,sy+10,2,10);X.fillStyle=P.c3;X.fillRect(sx+3,sy+13,6,4);X.fillStyle=p1;X.fillRect(sx+3,sy+4,6,4);X.fillRect(sx+3,sy+11,6,4);X.fillRect(sx,sy+7,4,6);X.fillRect(sx+8,sy+7,4,6);X.fillStyle=p2;X.fillRect(sx+4,sy+7,4,6);});}
function drawMushrooms(){[[10,11],[17,8],[5,25],[26,15]].forEach(([mc,mr])=>{const {sx,sy}=sw(mc*T+4,mr*T+6);X.fillStyle='#e0e0c8';X.fillRect(sx+5,sy+11,7,8);X.fillStyle='#b01808';X.fillRect(sx+2,sy+7,14,7);X.fillStyle='#c82010';X.fillRect(sx,sy+4,18,5);X.fillStyle='#f0f0e8';X.fillRect(sx+3,sy+5,4,3);X.fillRect(sx+11,sy+6,4,3);});}

function drawGarden(){
  const ox=T,oy=13*T,gw=8*T,gh=8*T;const {sx,sy}=sw(ox,oy);
  for(let row=0;row<gh;row+=4)for(let col=0;col<gw;col+=4){const v=(Math.floor(row/4)+Math.floor(col/4))%3;X.fillStyle=[P.s1,P.s2,P.s3][v];X.fillRect(sx+col,sy+row,4,4);}
  X.fillStyle=P.fe2;X.fillRect(sx-3,sy,3,gh);X.fillRect(sx+gw,sy,3,gh);X.fillRect(sx,sy-3,gw,3);X.fillRect(sx,sy+gh,gw,3);
  for(let i=0;i<=gh;i+=T*2){X.fillStyle=P.fe1;X.fillRect(sx-3,sy+i,3,7);X.fillRect(sx+gw,sy+i,3,7);}
  const bx=[sx+5,sx+T*4+5,sx+5,sx+T*4+5],by=[sy+5,sy+5,sy+T*4+8,sy+T*4+8];
  ['at1','at2','at3','at4'].forEach((k,i)=>{
    const dn=ST.at[k];
    for(let row=0;row<3;row++)for(let col=0;col<T*4-10;col+=9){X.fillStyle=row%2===0?P.s2:P.s3;X.fillRect(bx[i]+col,by[i]+row*9,9,4);}
    if(dn){X.fillStyle=P.fe2;for(let si=0;si<3;si++){X.fillRect(bx[i]+6+si*T,by[i]+2,T-12,T+2);}for(let si=0;si<3;si++){X.fillStyle=P.c4;X.fillRect(bx[i]+8+si*T,by[i],T-16,4);X.fillStyle=P.cf;X.fillRect(bx[i]+8+si*T,by[i]-4,8,6);}}
    else{for(let si=0;si<4;si++){X.fillStyle=P.fe2;X.fillRect(bx[i]+5+si*T-3,by[i]+2,3,T-4);X.fillStyle=P.c2;X.fillRect(bx[i]+3+si*T-3,by[i]+T-8,7,10);}}
    X.fillStyle='rgba(8,6,2,0.8)';X.fillRect(bx[i]+2,by[i]+T*3+2,26,11);
    X.fillStyle=dn?'#80c040':'#c8901c';X.font='5px "Press Start 2P",monospace';X.textAlign='left';X.fillText(`AT${i+1}`,bx[i]+4,by[i]+T*3+9);
  });
}

function drawPond(){
  const px=23*T,py=T,pw=5*T,ph=4*T;const {sx,sy}=sw(px,py);
  X.fillStyle=P.wa1;X.fillRect(sx,sy,pw,ph);X.fillStyle=P.wa2;X.fillRect(sx+4,sy+4,pw-8,ph-8);X.fillStyle=P.wa3;X.fillRect(sx+8,sy+8,pw-16,ph-16);
  X.fillStyle=P.wa4;const rOff=(fc*0.4)%24;for(let i=0;i<3;i++){X.fillRect(sx+10+(i*18+rOff)%56,sy+10,12,2);}
  X.fillStyle=P.g3;X.fillRect(sx,sy+ph,pw,5);
  [[sx+5,sy+ph-8],[sx+pw-12,sy+ph-6]].forEach(([rx,ry])=>{X.fillStyle=P.c1;X.fillRect(rx,ry,3,14);X.fillStyle='#1a4808';X.fillRect(rx,ry-6,6,8);X.fillStyle='#e83060';X.fillRect(rx+1,ry-7,4,3);});
}

function drawWell(){
  const wx=20*T,wy=14*T,ww=4*T,wh2=3*T;const {sx,sy}=sw(wx,wy);const lv=wellLv();
  for(let row=0;row<wh2;row+=7)for(let col=0;col<ww;col+=9){const tone=(Math.floor(row/7)+Math.floor(col/9))%3;X.fillStyle=[P.st2,P.st1,P.st3][tone];X.fillRect(sx+col,sy+T+row,9,7);}
  X.fillStyle=P.wa1;X.fillRect(sx+4,sy+T+4,ww-8,wh2-8);
  if(lv>0){const wh3=Math.round((wh2-8)*lv);X.fillStyle=P.wa3;X.fillRect(sx+4,sy+T+wh2-8-wh3+4,ww-8,wh3);X.fillStyle=P.wa4;if(wh3>3)X.fillRect(sx+4,sy+T+wh2-8-wh3+4,ww-8,3);}
  X.fillStyle=P.st3;X.fillRect(sx-3,sy+T-5,ww+6,8);
  X.fillStyle=P.w1;X.fillRect(sx+3,sy,5,T+3);X.fillRect(sx+ww-8,sy,5,T+3);
  X.fillStyle=P.w1;X.fillRect(sx-5,sy+8,ww+10,10);X.fillStyle=P.w3;X.fillRect(sx-3,sy+10,ww+6,6);
  X.fillStyle=P.w2;X.fillRect(sx+ww/2-7,sy+T-7,14,12);X.fillStyle=P.st3;X.fillRect(sx+ww/2-5,sy+T-5,10,8);
}

function drawMailbox(){
  const mx=13*T,my=22*T;const {sx,sy}=sw(mx,my);
  X.fillStyle=P.st2;X.fillRect(sx+T-4,sy+T,8,T+4);
  X.fillStyle='#b01808';X.fillRect(sx,sy,T*2+6,T);X.fillStyle='#c82010';X.fillRect(sx+2,sy+2,T*2+2,T-4);X.fillStyle='#901208';X.fillRect(sx,sy,T*2+6,5);
  X.fillStyle=P.w2;X.fillRect(sx+T*2+3,sy+3,3,T-6);X.fillStyle='#c02018';X.fillRect(sx+T*2+6,sy+3,9,9);
  const unread=ST.mail.filter((_,i)=>!ST.mailRead.includes(i)).length;
  if(unread>0){X.fillStyle='#e8e8d8';X.fillRect(sx+5,sy+7,T*2-4,T-12);X.fillStyle='#3060b8';X.fillRect(sx+7,sy+9,T*2-8,T-16);X.fillStyle='#4070c8';X.beginPath();X.moveTo(sx+7,sy+9);X.lineTo(sx+T+3,sy+16);X.lineTo(sx+T*2-1,sy+9);X.closePath();X.fill();}
}

function drawCave(){
  const ox=24*T,oy=21*T;const {sx,sy}=sw(ox,oy);
  for(let row=0;row<5*T;row+=6)for(let col=0;col<5*T;col+=8){const tone=(Math.floor(row/6)+Math.floor(col/8))%4;X.fillStyle=[P.st1,P.st2,P.st3,P.st2][tone];X.fillRect(sx+col,sy+row+8,8,6);}
  X.fillStyle='#060408';X.beginPath();X.arc(sx+2*T+6,sy+4*T+4,T*1.1,0,Math.PI,false);X.fill();
  X.fillStyle='#04030a';X.beginPath();X.arc(sx+2*T+6,sy+4*T+4,T*.9,0,Math.PI,false);X.fill();
  for(let ai=0;ai<8;ai++){const ang=Math.PI-ai*(Math.PI/7),arx=sx+2*T+6+Math.cos(ang)*(T*1.1+4),ary=sy+4*T+4-Math.sin(ang)*(T*1.1+4);X.fillStyle=ai%2===0?P.st3:P.st2;X.fillRect(arx-4,ary-4,8,8);}
  [[sx+6,sy+8],[sx+4*T-12,sy+10]].forEach(([vx,vy])=>{for(let vs=0;vs<5;vs++){X.fillStyle=vs%2===0?P.c2:P.c1;X.fillRect(vx+vs%2*4,vy+vs*8,5,10);}});
}

function drawScarecrow(){
  const {sx,sy}=sw(17*T,10*T);
  X.fillStyle=P.w2;X.fillRect(sx+7,sy,4,T*2+4);X.fillStyle=P.w2;X.fillRect(sx,sy+T/2-2,T,5);
  X.fillStyle=P.d2;X.fillRect(sx+3,sy+T/2+4,T-6,T+6);
  X.fillStyle='#d09060';X.fillRect(sx+4,sy-13,10,13);
  X.fillStyle='#c07818';X.fillRect(sx+2,sy-18,14,6);X.fillStyle='#d08820';X.fillRect(sx+4,sy-22,10,6);
  X.fillStyle='#3a1808';X.fillRect(sx+6,sy-10,3,3);X.fillRect(sx+11,sy-10,3,3);
  X.fillStyle='#c02018';X.fillRect(sx+7,sy-5,5,2);
}

function drawBarrels(){[[6,8],[7,8]].forEach(([bc,br])=>{const {sx,sy}=sw(bc*T+2,br*T+4);for(let p2=0;p2<3;p2++){X.fillStyle=[P.w2,P.w3,P.w2][p2];X.fillRect(sx+p2*14,sy,14,T+6);}for(let ring=0;ring<3;ring++){X.fillStyle=P.st2;X.fillRect(sx,sy+5+ring*14,T+4,4);}});}

function drawNPCs(){
  // Static NPC near the house entrance
  const {sx,sy}=sw(7*T,9*T);
  if(npcImg.complete&&npcImg.naturalWidth>0){
    // NPC faces south, idle (row 2, col 1)
    X.drawImage(npcImg,1*16,2*16,16,16,sx,sy,T,T);
  } else {
    X.fillStyle='#a06030';X.fillRect(sx+4,sy+4,T-8,T-8);
  }
}

function drawButterflies(){
  const t2=fc*.018;
  [[10,16,0],[16,8,1],[23,12,2],[7,21,3]].forEach(([bc,br,idx])=>{
    const bx2=bc*T+Math.sin(t2+idx*2.1)*20,by2=br*T+Math.cos(t2*1.3+idx*1.7)*12;
    const {sx,sy}=sw(bx2,by2);if(sx<-10||sx>VW+10||sy<-10||sy>VH+10)return;
    const wing=Math.sin(fc*.14+idx)*.5+.5,ww2=Math.round(3+wing*5);
    const cols=[['#d040a0','#f870c8'],['#40a0d8','#80d0f8'],['#e8b010','#f8e060'],['#8040b0','#c080e0']];
    const [c1,c2]=cols[idx%4];
    X.fillStyle=c1;X.fillRect(sx-ww2,sy,ww2,6);X.fillRect(sx,sy,ww2,6);X.fillStyle=c2;X.fillRect(sx-ww2+1,sy+1,ww2-2,4);X.fillRect(sx+1,sy+1,ww2-2,4);X.fillStyle='#1a0e04';X.fillRect(sx,sy+1,1,7);
  });
}

function drawLabels(){
  X.font='6px "Press Start 2P",monospace';X.textAlign='center';
  [{wx:7*T,wy:9*T,t:'FARMHOUSE'},{wx:22*T,wy:9*T,t:'STUDY TREE'},{wx:5*T,wy:12*T,t:'GARDEN'},{wx:22*T,wy:13*T,t:'WELL'},{wx:14*T,wy:21*T,t:'MAILBOX'},{wx:26*T,wy:20*T,t:'CAVE'}].forEach(l=>{
    const {sx,sy}=sw(l.wx,l.wy);
    if(sx>-90&&sx<VW+90&&sy>-12&&sy<VH+12){X.fillStyle='rgba(8,6,2,0.72)';X.fillText(l.t,sx+1,sy+1);X.fillStyle='#f0d060';X.fillText(l.t,sx,sy);}
  });
}

// ── PLAYER ───────────────────────────────────────────────────────
const pl={x:13*T,y:16*T,dir:2,moving:false,walkF:0,stepCount:0};

function drawPlayer(){
  const {sx,sy}=sw(pl.x,pl.y);
  const bob=(pl.moving&&Math.floor(fc/5)%2===0)?-2:0;
  const SC=2, SH=HTILE*SC, SW2=HTILE*SC;
  const drawY=sy+bob;
  const feetY=drawY+SH;
  const feetCX=sx+SW2/2;

  // Shadow ellipse at feet — attached to foot position, bobs with character
  X.fillStyle='rgba(0,0,0,0.28)';
  X.beginPath();
  X.ellipse(feetCX, feetY-1, 10, 3, 0, 0, Math.PI*2);
  X.fill();

  if(!heroImg.complete||heroImg.naturalWidth===0){
    X.fillStyle='#c07020';X.fillRect(sx+4,drawY+2,SW2-8,SH-2);
    return;
  }

  // dir: 0=north(row0), 1=east(row3), 2=south(row2), 3=west(row1 mirrored)
  // LPC layout: row0=up, row1=left, row2=down, row3=right
  // walkF cycles: col0=left step, col1=idle, col2=right step
  const walkFrame=pl.moving?(Math.floor(pl.walkF/4)%2===0?0:2):1;

  if(pl.dir===2){
    // South — row 2
    drawHero(2,walkFrame,sx,drawY,SC,false);
  } else if(pl.dir===0){
    // North — row 0
    drawHero(0,walkFrame,sx,drawY,SC,false);
  } else if(pl.dir===1){
    // East — row 3
    drawHero(3,walkFrame,sx,drawY,SC,false);
  } else {
    // West — row 1 (LPC has dedicated left-facing row)
    drawHero(1,walkFrame,sx,drawY,SC,false);
  }
}

// ── MINIMAP ───────────────────────────────────────────────────────
function drawMinimap(){
  const S=80,sc=S/MW;
  MX.fillStyle='#3a6018';MX.fillRect(0,0,S,S);
  MX.fillStyle='#9a6018';MX.fillRect(10*T*sc,0,4*T*sc,S);MX.fillRect(0,19*T*sc,S,4*T*sc);
  [{cx:8,cy:4,c:'#8b4010'},{cx:22,cy:4,c:'#206010'},{cx:5,cy:18,c:'#4a7020'},{cx:22,cy:18,c:'#606060'},{cx:14,cy:22,c:'#c01010'},{cx:26,cy:23,c:'#202040'}].forEach(o=>{
    MX.fillStyle=o.c;MX.fillRect(o.cx*T*sc-2,o.cy*T*sc-2,6,6);
  });
  const px2=(pl.x/MW)*S,py2=(pl.y/MH2)*S;
  MX.fillStyle='#f0d060';MX.fillRect(Math.round(px2)-2,Math.round(py2)-2,4,4);
  MX.strokeStyle='rgba(240,208,96,0.35)';MX.lineWidth=1;
  MX.strokeRect(cam.x*sc,cam.y*sc,VW*sc,VH*sc);
}

// ── UPDATE ────────────────────────────────────────────────────────
function updatePlayer(){
  if(modalOpen||dlgQueue.length){pl.moving=false;return;}
  const spd=3;let dx=0,dy=0;
  if(K['ArrowLeft']||K['a']||K['A']){dx=-spd;pl.dir=3;}
  if(K['ArrowRight']||K['d']||K['D']){dx=spd;pl.dir=1;}
  if(K['ArrowUp']||K['w']||K['W']){dy=-spd;pl.dir=0;}
  if(K['ArrowDown']||K['s']||K['S']){dy=spd;pl.dir=2;}
  pl.moving=dx!==0||dy!==0;
  pl.x=Math.max(T,Math.min(MW-T*2,pl.x+dx));
  pl.y=Math.max(T,Math.min(MH2-T*2,pl.y+dy));
  if(pl.moving){pl.walkF=(pl.walkF+1)%12;pl.stepCount++;ST.stepCount++;}
  if(pl.stepCount===300)showToast('Explorer! Walking every corner of the farm.');
  if(pl.stepCount===1000)showToast('1000 steps — you know this garden well.');
}
function updateCam(){
  const tx=pl.x+T/2-VW/2,ty=pl.y+T/2-VH/2;
  cam.x+=(tx-cam.x)*.1;cam.y+=(ty-cam.y)*.1;
  cam.x=Math.max(0,Math.min(MW-VW,cam.x));cam.y=Math.max(0,Math.min(MH2-VH,cam.y));
}
function updateHint(){
  const obj=nearObj();
  const hint=document.getElementById('ih'),hr=document.getElementById('hr');
  if(obj&&!modalOpen&&!dlgQueue.length){hint.style.display='block';hint.textContent=`[E] ${obj.label}`;hr.textContent=`[E] OPEN: ${obj.label}`;}
  else{hint.style.display='none';hr.textContent=dlgQueue.length?'[SPACE] Continue':'WASD · E=INTERACT';}
}

// ── LOOP ──────────────────────────────────────────────────────────
function loop(){
  fc++;updatePlayer();updateCam();
  X.clearRect(0,0,VW,VH);
  drawGround();drawPond();drawPaths();
  drawBgTrees();drawRocks();drawFlowers();drawMushrooms();
  drawFence();
  drawHouse();drawScarecrow();drawBarrels();drawNPCs();
  drawGarden();drawTree();drawWell();drawCave();drawMailbox();
  drawButterflies();drawLabels();drawPlayer();
  updateHint();drawMinimap();
  requestAnimationFrame(loop);
}
loop();
</script>
