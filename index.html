<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mr Glass' Garden — Year 11 Biology</title>
<script src="phaser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #1a2810; overflow: hidden;
    font-family: 'Courier New', monospace; }
  #game-container { width: 100vw; height: 100vh; display: flex;
    align-items: center; justify-content: center; }
  canvas { image-rendering: pixelated; image-rendering: crisp-edges;
    /* Stardew Valley-ish hue: gently warm, saturated, slightly higher contrast */
    filter: saturate(1.18) brightness(1.03) contrast(1.06) hue-rotate(-4deg); }

  /* ---- modal ---- */
  #modal-overlay { position: fixed; inset: 0; background: rgba(4,3,1,0.82);
    display: none; align-items: center; justify-content: center; z-index: 1000; }
  #modal-overlay.open { display: flex; }
  #modal { background: #f5e8c8; border: 4px solid #7a4c10; outline: 3px solid #c8901c;
    width: 92%; max-width: 760px; max-height: 88%; display: flex; flex-direction: column;
    box-shadow: 0 8px 0 #5a3808; }
  #modal-head { background: #7a4c10; padding: 12px 16px; display: flex;
    justify-content: space-between; align-items: center; border-bottom: 3px solid #5a3808; }
  #modal-title { color: #f0d060; font-size: 15px; letter-spacing: 1px; font-weight: bold; }
  #modal-close { background: #501008; border: 2px solid #c03010; color: #f0d060;
    font-size: 13px; padding: 5px 12px; cursor: pointer; font-family: inherit; }
  #modal-close:hover { background: #6a1810; }
  #modal-body { overflow-y: auto; padding: 16px 18px; flex: 1; color: #3a2004; }

  .legend { display:flex; gap:16px; margin-bottom:12px; font-size:11px; color:#7a4820; }
  .legend span { display:flex; align-items:center; gap:5px; }
  .box { width:14px; height:14px; border:2px solid; display:inline-flex;
    align-items:center; justify-content:center; font-size:11px; line-height:1; }
  .box.none { border-color:#c8a860; background:#f0e8d0; color:transparent; }
  .box.prog { border-color:#c8901c; background:#fff0c0; color:#c8901c; }
  .box.conf { border-color:#40a020; background:#d8f0c8; color:#40a020; }

  .stats { display:flex; gap:10px; margin-bottom:12px; }
  .stat { flex:1; background:#fdf0d0; border:2px solid #c8a860; padding:8px 10px; text-align:center; }
  .stat label { display:block; color:#7a5820; font-size:9px; margin-bottom:4px; }
  .stat b { font-size:18px; }

  .pbar { height:12px; background:#2a1c04; border:2px solid #c8a860; margin:6px 0 14px;
    overflow:hidden; border-radius:2px; }
  .pfill { height:100%; transition: width 0.5s ease; }

  .sect { margin-bottom:18px; }
  .sect-title { color:#5a3000; font-size:13px; margin-bottom:8px; padding-bottom:5px;
    border-bottom:2px solid #c8901c; font-weight:bold; }
  .grouphead { color:#5a7020; font-size:13px; font-weight:bold; margin-bottom:8px; }
  .iq { color:#7a4000; font-size:11px; margin:12px 0 6px; font-weight:bold; }
  .dp { display:flex; align-items:flex-start; gap:9px; margin-bottom:5px; cursor:pointer;
    padding:7px; border:1px solid #e0c890; background:#fdf5dc; }
  .dp:hover { border-color:#c8901c; background:#fff8e8; }
  .dp span { font-size:12px; line-height:1.5; }

  .row { display:flex; justify-content:space-between; align-items:center; padding:8px 10px;
    border:1px solid #e0c890; background:#fdf5dc; margin-bottom:4px; cursor:pointer; }
  .row:hover { border-color:#c8901c; background:#fff8e8; }
  .row span { font-size:12px; }
  .chk { width:16px; height:16px; border:2px solid #c8a860; display:inline-flex;
    align-items:center; justify-content:center; font-size:12px; color:#40a020; }
  .chk.on { background:#d8f0c8; border-color:#40a020; }

  .bed { border:2px solid #c8a860; padding:11px; margin-bottom:10px; background:#fdf0d0; }
  .bed b { color:#5a3000; font-size:13px; }
  .note { color:#7a5820; font-size:11px; margin:8px 0 12px; }
  .note2 { color:#7a5820; font-size:11px; margin:4px 0; }
  .btn { background:#d8f0c8; border:2px solid #40a020; color:#305010; font-size:12px;
    padding:7px 14px; cursor:pointer; font-family:inherit; margin-top:6px; }
  .btn:hover { background:#c8e8b8; }
  .btn.done { background:#f0fce8; color:#80b060; border-color:#80b060; cursor:default; }

  .mail { background:#eef4ff; border:2px solid #8898c0; padding:11px; margin-bottom:10px; }
  .mail.new { border-color:#6878c8; }
  .mfrom { color:#506090; font-size:11px; margin-bottom:4px; }
  .msubj { color:#304080; font-size:13px; font-weight:bold; margin-bottom:6px; }
  .mbody { color:#505878; font-size:12px; line-height:1.6; }

  .modulepick { display:flex; flex-direction:column; gap:10px; margin-top:8px; }
  .modbtn { display:block; width:100%; text-align:left; background:#fdf0d0;
    border:2px solid #c8a860; padding:11px 13px; cursor:pointer; font-family:inherit;
    color:#3a2004; }
  .modbtn:hover { background:#fff8e8; border-color:#c8901c; }
  .modtitle { font-size:13px; font-weight:bold; color:#5a3000; margin-bottom:3px; }
  .modsub { font-size:11px; color:#7a5820; }
  .backbtn { background:#7a4c10; border:2px solid #5a3808; color:#f0d060;
    font-size:11px; padding:6px 12px; cursor:pointer; font-family:inherit;
    margin-bottom:12px; }
  .backbtn:hover { background:#8b5c14; }
</style>
</head>
<body>
  <div id="game-container"></div>

  <div id="modal-overlay">
    <div id="modal">
      <div id="modal-head">
        <span id="modal-title"></span>
        <button id="modal-close">&#10005; CLOSE</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="ui.js"></script>
  <script src="game.js"></script>
</body>
</html>
